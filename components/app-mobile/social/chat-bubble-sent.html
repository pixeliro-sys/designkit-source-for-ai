<!--
  @name: Chat Bubble — Sent
  @kit: app-mobile
  @width: 260
  @height: 60
  @tags: chat, bubble, sent, message
-->
<div data-component="Chat Bubble — Sent" style="width:100%;max-width:260px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:column;align-items:flex-end;">
  <div style="max-width:85%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-md,12px) var(--kit-radius-md,12px) var(--kit-radius-sm,4px) var(--kit-radius-md,12px);padding:10px 14px;display:flex;flex-direction:column;gap:4px;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-bg,#FFFFFF);line-height:1.4;">Hey! Are you free for coffee today?</span>
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;">
      <span style="font-size:var(--kit-text-xs,12px);color:rgba(255,255,255,0.7);">2:30 PM</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 12 5 16 12 9"/><polyline points="7 12 11 16 18 9"/></svg>
    </div>
  </div>
</div>
