<!--
  @name: Post Card
  @kit: app-mobile
  @width: 360
  @height: 440
  @tags: post, card, feed, social
-->
<div data-component="Post Card" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);display:flex;flex-direction:column;">
  <div style="padding:12px 16px;display:flex;align-items:center;gap:10px;">
    <div style="width:40px;height:40px;border-radius:var(--kit-radius-full,9999px);overflow:hidden;flex-shrink:0;">
      <img src="https://placehold.jp/40x40" alt="Emma Wilson" style="width:100%;height:100%;object-fit:cover;display:block;" />
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:1px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Emma Wilson</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">2 hours ago</span>
    </div>
    <button style="border:none;background:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3,#94A3B8)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
  </div>
  <div style="padding:0 16px 12px;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text,#0F172A);line-height:1.5;">Just finished an amazing hike up Mount Rainier! The views from the summit were absolutely breathtaking. Nature never disappoints.</span>
  </div>
  <div style="width:100%;height:200px;overflow:hidden;">
    <img src="https://placehold.jp/360x200" alt="Mountain view" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:20px;">
      <div style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--kit-danger,#EF4444)" stroke="var(--kit-danger,#EF4444)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">248</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2,#475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">42</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2,#475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
        <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">18</span>
      </div>
    </div>
    <button style="border:none;background:none;cursor:pointer;padding:4px;display:flex;align-items:center;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2,#475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
    </button>
  </div>
</div>
