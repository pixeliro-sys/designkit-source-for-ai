<!--
  @name: Story Circle
  @kit: app-mobile
  @width: 72
  @height: 90
  @tags: story, circle, avatar, social
-->
<div data-component="Story Circle" style="width:72px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:column;align-items:center;gap:6px;">
  <div style="width:64px;height:64px;border-radius:var(--kit-radius-full,9999px);padding:3px;background:linear-gradient(135deg, var(--kit-primary,#6366F1), #EC4899, var(--kit-warning,#F59E0B));display:flex;align-items:center;justify-content:center;">
    <div style="width:56px;height:56px;border-radius:var(--kit-radius-full,9999px);overflow:hidden;border:2px solid var(--kit-bg,#FFFFFF);">
      <img src="https://placehold.jp/56x56" alt="Sarah" style="width:100%;height:100%;object-fit:cover;display:block;" />
    </div>
  </div>
  <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text,#0F172A);font-weight:var(--kit-font-medium,500);text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Sarah</span>
</div>
