<!--
  @name: Notification Item
  @kit: app-mobile
  @width: 360
  @height: 72
  @tags: notification, item, alert, social
-->
<div data-component="Notification Item" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-surface,#F8FAFC);padding:12px 16px;display:flex;flex-direction:row;align-items:center;gap:12px;">
  <div style="width:40px;min-width:40px;height:40px;border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
    <img src="https://placehold.jp/40x40" alt="Sarah" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:2px;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text,#0F172A);line-height:1.4;"><span style="font-weight:var(--kit-font-semibold,600);">Sarah</span> liked your post</span>
    <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">2h ago</span>
  </div>
  <div style="width:8px;height:8px;border-radius:var(--kit-radius-full,9999px);background:var(--kit-primary,#6366F1);flex-shrink:0;"></div>
</div>
