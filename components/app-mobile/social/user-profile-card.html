<!--
  @name: User Profile Card
  @kit: app-mobile
  @width: 320
  @height: 200
  @tags: profile, user, card, social
-->
<div data-component="User Profile Card" style="width:100%;max-width:320px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="width:64px;height:64px;border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
    <img src="https://placehold.jp/64x64" alt="Alex Morgan" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
    <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">Alex Morgan</span>
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-3,#94A3B8);">@alexmorgan</span>
  </div>
  <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-align:center;line-height:1.4;">Digital designer & photographer. Creating beautiful things one pixel at a time.</span>
  <div style="display:flex;align-items:center;gap:24px;">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">1.2K</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Followers</span>
    </div>
    <div style="width:1px;height:28px;background:var(--kit-border,#E2E8F0);"></div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">348</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Following</span>
    </div>
  </div>
  <button style="width:100%;padding:10px 0;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;">Follow</button>
</div>
