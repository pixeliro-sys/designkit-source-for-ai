<!--
  @name: Select / Dropdown
  @category: inputs
  @kit: app-mobile
  @width: 360
  @height: 56
  @tags: select, dropdown, form
-->
<div data-component="Select / Dropdown" style="position:relative;width:100%;height:56px;font-family:var(--kit-font, system-ui, -apple-system, sans-serif)">
  <div style="display:flex;align-items:center;width:100%;height:56px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-sm, 4px);padding:0 16px;box-sizing:border-box;cursor:pointer">
    <div style="flex:1;font-size:var(--kit-text-md, 16px);color:var(--kit-text, #0F172A)">Selected option</div>
    <div style="color:var(--kit-text-2, #475569)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
  <div style="position:absolute;top:-8px;left:12px;background:var(--kit-bg, #FFFFFF);padding:0 4px;font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">Label</div>
</div>
