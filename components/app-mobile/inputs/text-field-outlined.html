<!--
  @name: Text Field — Outlined
  @category: inputs
  @kit: app-mobile
  @width: 360
  @height: 56
  @tags: input, text-field, outlined, form
-->
<div data-component="Text Field — Outlined" style="position:relative;width:100%;height:56px;font-family:var(--kit-font, system-ui, -apple-system, sans-serif)">
  <div style="width:100%;height:56px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-sm, 4px);padding:16px;box-sizing:border-box;font-size:var(--kit-text-md, 16px);color:var(--kit-text, #0F172A);background:transparent">Placeholder text</div>
  <div style="position:absolute;top:-8px;left:12px;background:var(--kit-bg, #FFFFFF);padding:0 4px;font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">Label</div>
</div>
