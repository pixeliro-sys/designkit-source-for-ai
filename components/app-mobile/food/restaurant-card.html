<!--
  @name: Restaurant Card
  @kit: app-mobile
  @width: 340
  @height: 260
  @tags: restaurant, card, food, delivery
-->
<div data-component="Restaurant Card" style="width:100%;max-width:340px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);overflow:hidden;box-shadow:var(--kit-shadow-sm, 0 1px 2px rgba(0,0,0,0.05))">
  <div style="position:relative;width:100%;height:140px;overflow:hidden">
    <img src="https://placehold.jp/340x140.png" alt="Sakura Sushi" style="width:100%;height:100%;object-fit:cover;display:block"/>
    <span style="position:absolute;top:8px;left:8px;background:var(--kit-primary, #6366F1);color:#FFFFFF;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);padding:4px 10px;border-radius:var(--kit-radius-full, 9999px)">Popular</span>
  </div>
  <div style="padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Sakura Sushi</div>
      <div style="display:flex;align-items:center;gap:3px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">4.7</span>
        <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">(128)</span>
      </div>
    </div>
    <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-top:4px">Japanese &bull; Sushi</div>
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
      <div style="display:flex;align-items:center;gap:4px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">25-35 min</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 18H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3.19M15 6h2a2 2 0 0 1 2 2v2M17 14h4"/><circle cx="7.5" cy="15.5" r="3.5"/><circle cx="17.5" cy="15.5" r="3.5"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">$2.99 delivery</span>
      </div>
    </div>
  </div>
</div>
