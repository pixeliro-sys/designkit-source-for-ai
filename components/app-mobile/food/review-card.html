<!--
  @name: Review Card
  @kit: app-mobile
  @width: 360
  @height: 150
  @tags: review, rating, feedback, food
-->
<div data-component="Review Card" style="width:100%;max-width:360px;box-sizing:border-box;padding:14px 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
    <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden;flex-shrink:0"><img src="https://placehold.jp/36x36.png" alt="Avatar" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
    <div style="flex:1;min-width:0">
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Emma Wilson</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">2 days ago</div>
    </div>
    <div style="display:flex;gap:2px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-border, #E2E8F0)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
    </div>
  </div>
  <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">Amazing sushi! The salmon was incredibly fresh and the presentation was beautiful. Service was attentive and friendly.</div>
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:6px;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>
      <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">Helpful (12)</span>
    </div>
    <div style="display:flex;gap:4px">
      <img src="https://placehold.jp/32x32.png" alt="Food photo" style="width:32px;height:32px;border-radius:var(--kit-radius-sm, 4px);object-fit:cover;display:block"/>
      <img src="https://placehold.jp/32x32.png" alt="Food photo" style="width:32px;height:32px;border-radius:var(--kit-radius-sm, 4px);object-fit:cover;display:block"/>
      <img src="https://placehold.jp/32x32.png" alt="Food photo" style="width:32px;height:32px;border-radius:var(--kit-radius-sm, 4px);object-fit:cover;display:block"/>
    </div>
  </div>
</div>
