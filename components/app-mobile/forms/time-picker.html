<!--
  @name: Time Picker
  @kit: app-mobile
  @width: 280
  @height: 200
  @tags: time, picker, clock, input
-->
<div data-component="Time Picker" style="width:100%;background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);padding:var(--kit-space-5, 20px);box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);text-align:center;margin-bottom:var(--kit-space-4, 16px)">Select Time</div>
  <div style="display:flex;align-items:center;justify-content:center;gap:var(--kit-space-3, 12px);margin-bottom:var(--kit-space-5, 20px)">
    <div style="display:flex;flex-direction:column;align-items:center;gap:var(--kit-space-1, 4px)">
      <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8);padding:2px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div style="width:56px;height:48px;background:var(--kit-surface, #F8FAFC);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-2xl, 24px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">09</div>
      <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8);padding:2px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div style="font-size:var(--kit-text-2xl, 24px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);padding-bottom:4px">:</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:var(--kit-space-1, 4px)">
      <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8);padding:2px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></div>
      <div style="width:56px;height:48px;background:var(--kit-surface, #F8FAFC);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-2xl, 24px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">30</div>
      <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8);padding:2px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px);margin-left:var(--kit-space-2, 8px)">
      <div style="width:44px;height:32px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border-radius:var(--kit-radius-sm, 4px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);cursor:pointer">AM</div>
      <div style="width:44px;height:32px;background:var(--kit-surface, #F8FAFC);border:1px solid var(--kit-border, #E2E8F0);color:var(--kit-text-2, #475569);border-radius:var(--kit-radius-sm, 4px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);cursor:pointer">PM</div>
    </div>
  </div>
  <button type="button" style="width:100%;height:40px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);cursor:pointer;font-family:var(--kit-font, Inter, system-ui, sans-serif)">Confirm</button>
</div>
