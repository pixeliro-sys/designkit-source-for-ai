<!--
  @name: Form — Payment Card
  @kit: app-mobile
  @width: 360
  @height: 280
  @tags: form, payment, credit card, checkout
-->
<div data-component="Form — Payment Card" style="width:100%;background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);padding:var(--kit-space-6, 24px);box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:var(--kit-space-5, 20px)">Payment Details</div>
  <form style="display:flex;flex-direction:column;gap:var(--kit-space-4, 16px)">
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);text-transform:uppercase;letter-spacing:0.5px">Card Number</label>
      <div style="position:relative">
        <input type="text" placeholder="1234 5678 9012 3456" style="width:100%;height:44px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 44px 0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
        <div style="position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--kit-text-3, #94A3B8)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
      </div>
    </div>
    <div style="display:flex;gap:var(--kit-space-3, 12px)">
      <div style="flex:1;display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
        <label style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);text-transform:uppercase;letter-spacing:0.5px">Expiry</label>
        <input type="text" placeholder="MM / YY" style="height:44px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
        <label style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);text-transform:uppercase;letter-spacing:0.5px">CVC</label>
        <input type="text" placeholder="123" style="height:44px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);text-transform:uppercase;letter-spacing:0.5px">Cardholder Name</label>
      <input type="text" placeholder="Name on card" style="height:44px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
    </div>
    <button type="submit" style="height:46px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);cursor:pointer;font-family:var(--kit-font, Inter, system-ui, sans-serif);display:flex;align-items:center;justify-content:center;gap:8px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Pay Now
    </button>
  </form>
</div>
