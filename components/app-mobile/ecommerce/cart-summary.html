<!--
  @name: Cart Summary
  @kit: app-mobile
  @width: 360
  @height: 220
  @tags: cart, summary, total, checkout, ecommerce
-->
<div data-component="Cart Summary" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:16px;display:flex;flex-direction:column;gap:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Subtotal</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">$189.97</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Shipping</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-success,#22C55E);">Free</span>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Tax</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">$15.20</span>
  </div>
  <div style="height:1px;background:var(--kit-border,#E2E8F0);"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">Total</span>
    <span style="font-size:var(--kit-text-lg,18px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$205.17</span>
  </div>
  <div style="display:flex;gap:8px;">
    <input type="text" placeholder="Enter promo code" style="flex:1;padding:10px 12px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-family:var(--kit-font,Inter,system-ui,sans-serif);color:var(--kit-text,#0F172A);background:var(--kit-surface,#F8FAFC);outline:none;" />
    <button style="padding:10px 16px;background:var(--kit-surface-2,#F1F5F9);color:var(--kit-text,#0F172A);border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;">Apply</button>
  </div>
  <button style="width:100%;padding:14px 0;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:none;border-radius:var(--kit-radius-md,12px);font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;">Proceed to Checkout</button>
</div>
