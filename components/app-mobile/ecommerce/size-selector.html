<!--
  @name: Size Selector
  @kit: app-mobile
  @width: 300
  @height: 48
  @tags: size, selector, variant, ecommerce
-->
<div data-component="Size Selector" style="width:100%;max-width:300px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:row;align-items:center;gap:10px;">
  <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);min-width:32px;">Size</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;background:var(--kit-bg,#FFFFFF);">XS</div>
    <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;background:var(--kit-bg,#FFFFFF);">S</div>
    <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);cursor:pointer;border:1px solid var(--kit-primary,#6366F1);">M</div>
    <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;background:var(--kit-bg,#FFFFFF);">L</div>
    <div style="width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;background:var(--kit-bg,#FFFFFF);">XL</div>
  </div>
</div>
