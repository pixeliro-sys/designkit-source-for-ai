<!--
  @name: Wishlist Item
  @kit: app-mobile
  @width: 360
  @height: 80
  @tags: wishlist, favorite, saved, ecommerce
-->
<div data-component="Wishlist Item" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:10px 12px;display:flex;flex-direction:row;align-items:center;gap:12px;">
  <div style="width:60px;min-width:60px;height:60px;border-radius:var(--kit-radius,8px);overflow:hidden;">
    <img src="https://placehold.jp/60x60" alt="Silk Scarf" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Silk Scarf</span>
    <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$45.00</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <button style="border:none;background:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="var(--kit-danger,#EF4444)" stroke="var(--kit-danger,#EF4444)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
    </button>
    <button style="padding:8px 14px;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;white-space:nowrap;">Add to Cart</button>
  </div>
</div>
