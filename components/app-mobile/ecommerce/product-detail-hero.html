<!--
  @name: Product Detail Hero
  @kit: app-mobile
  @width: 360
  @height: 420
  @tags: product, detail, hero, ecommerce
-->
<div data-component="Product Detail Hero" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);display:flex;flex-direction:column;">
  <div style="width:100%;height:240px;overflow:hidden;">
    <img src="https://placehold.jp/360x240" alt="Wireless Headphones Pro" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">
    <span style="font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);line-height:1.3;">Wireless Headphones Pro</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;align-items:center;gap:2px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-border,#E2E8F0)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      </div>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">4.0</span>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-3,#94A3B8);">(128 reviews)</span>
    </div>
    <span style="font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$249.00</span>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Color</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#0F172A;border:2px solid var(--kit-primary,#6366F1);box-shadow:0 0 0 2px var(--kit-bg,#FFFFFF) inset;cursor:pointer;"></div>
        <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#6366F1;border:2px solid transparent;cursor:pointer;"></div>
        <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#F8FAFC;border:1px solid var(--kit-border,#E2E8F0);cursor:pointer;"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Size</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;">S</div>
        <div style="width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);cursor:pointer;border:1px solid var(--kit-primary,#6366F1);">M</div>
        <div style="width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;">L</div>
        <div style="width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--kit-radius,8px);border:1px solid var(--kit-border,#E2E8F0);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);cursor:pointer;">XL</div>
      </div>
    </div>
    <button style="width:100%;padding:14px 0;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:none;border-radius:var(--kit-radius-md,12px);font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;">Add to Cart</button>
  </div>
</div>
