<!--
  @name: Order Status
  @kit: app-mobile
  @width: 360
  @height: 120
  @tags: order, status, tracking, ecommerce
-->
<div data-component="Order Status" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:16px;display:flex;flex-direction:column;gap:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Order #12345</span>
      <span style="padding:2px 8px;background:rgba(34,197,94,0.1);color:var(--kit-success,#22C55E);font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);border-radius:var(--kit-radius-full,9999px);">Shipped</span>
    </div>
    <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Mar 24, 2026</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;">
    <div style="width:100%;height:6px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
      <div style="width:75%;height:100%;background:var(--kit-success,#22C55E);border-radius:var(--kit-radius-full,9999px);"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-2,#475569);">In transit</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-2,#475569);">Est. delivery: Mar 28, 2026</span>
    </div>
  </div>
</div>
