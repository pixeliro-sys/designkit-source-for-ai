<!--
  @name: Cart Item
  @kit: app-mobile
  @width: 360
  @height: 100
  @tags: cart, item, product, ecommerce
-->
<div data-component="Cart Item" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:12px;display:flex;flex-direction:row;align-items:center;gap:12px;">
  <div style="width:80px;min-width:80px;height:80px;border-radius:var(--kit-radius,8px);overflow:hidden;">
    <img src="https://placehold.jp/80x80" alt="Running Shoes" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
    <div style="display:flex;flex-direction:column;gap:2px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);line-height:1.3;">Running Shoes</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Size: 42 / Black</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:2px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);overflow:hidden;">
        <button style="width:28px;height:28px;border:none;background:var(--kit-surface,#F8FAFC);color:var(--kit-text-2,#475569);font-size:var(--kit-text-sm,14px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--kit-font,Inter,system-ui,sans-serif);">−</button>
        <span style="width:24px;text-align:center;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">2</span>
        <button style="width:28px;height:28px;border:none;background:var(--kit-surface,#F8FAFC);color:var(--kit-text-2,#475569);font-size:var(--kit-text-sm,14px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--kit-font,Inter,system-ui,sans-serif);">+</button>
      </div>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$59.99</span>
    </div>
  </div>
  <button style="width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-danger,#EF4444)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
  </button>
</div>
