<!--
  @name: Color Selector
  @kit: app-mobile
  @width: 220
  @height: 40
  @tags: color, selector, swatch, ecommerce
-->
<div data-component="Color Selector" style="width:100%;max-width:220px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:row;align-items:center;gap:10px;">
  <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);min-width:36px;">Color</span>
  <div style="display:flex;align-items:center;gap:8px;">
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#000000;cursor:pointer;border:2px solid var(--kit-primary,#6366F1);box-shadow:0 0 0 2px var(--kit-bg,#FFFFFF) inset;"></div>
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#6366F1;cursor:pointer;border:2px solid transparent;"></div>
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#EF4444;cursor:pointer;border:2px solid transparent;"></div>
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#22C55E;cursor:pointer;border:2px solid transparent;"></div>
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full,9999px);background:#F59E0B;cursor:pointer;border:2px solid transparent;"></div>
  </div>
</div>
