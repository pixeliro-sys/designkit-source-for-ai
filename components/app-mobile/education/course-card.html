<!--
  @name: Course Card
  @kit: app-mobile
  @width: 340
  @height: 260
  @tags: course, card, learning, education
-->
<div data-component="Course Card" style="width:100%;max-width:340px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);overflow:hidden;">
  <div style="position:relative;">
    <img src="https://placehold.jp/340x140.png" style="width:100%;height:140px;object-fit:cover;display:block;" alt="Course"/>
    <span style="position:absolute;top:10px;left:10px;padding:3px 10px;background:var(--kit-primary,#6366F1);color:#FFFFFF;font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);border-radius:var(--kit-radius-sm,4px);">Design</span>
  </div>
  <div style="padding:12px 14px;">
    <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);margin-bottom:8px;">UI/UX Design Fundamentals</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <img src="https://placehold.jp/24x24.png" style="width:24px;height:24px;border-radius:50%;object-fit:cover;display:block;" alt="Instructor"/>
        <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-2,#475569);">Sarah Miller</span>
      </div>
      <div style="display:flex;align-items:center;gap:3px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">4.8</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="flex:1;height:4px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
        <div style="width:65%;height:100%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-full,9999px);"></div>
      </div>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);flex-shrink:0;">12 of 18</span>
    </div>
  </div>
</div>
