<!--
  @name: Quiz — Multiple Choice
  @kit: app-mobile
  @width: 360
  @height: 340
  @tags: quiz, question, multiple choice, education
-->
<div data-component="Quiz — Multiple Choice" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:20px 16px;display:flex;flex-direction:column;gap:16px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-primary,#6366F1);">Question 3 of 10</span>
    <div style="width:80px;height:4px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
      <div style="width:30%;height:100%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-full,9999px);"></div>
    </div>
  </div>
  <div style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);line-height:1.4;">Which principle emphasizes visual hierarchy in UI design?</div>
  <div style="display:flex;flex-direction:column;gap:8px;">
    <div style="padding:12px 14px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);color:var(--kit-text,#0F172A);cursor:pointer;display:flex;align-items:center;gap:10px;">
      <span style="width:24px;height:24px;border-radius:50%;border:2px solid var(--kit-border,#E2E8F0);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text-2,#475569);flex-shrink:0;">A</span>
      <span>Consistency</span>
    </div>
    <div style="padding:12px 14px;border:2px solid var(--kit-primary,#6366F1);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);color:var(--kit-primary,#6366F1);font-weight:var(--kit-font-medium,500);cursor:pointer;background:rgba(99,102,241,0.05);display:flex;align-items:center;gap:10px;">
      <span style="width:24px;height:24px;border-radius:50%;background:var(--kit-primary,#6366F1);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);flex-shrink:0;">B</span>
      <span>Scale and proportion</span>
    </div>
    <div style="padding:12px 14px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);color:var(--kit-text,#0F172A);cursor:pointer;display:flex;align-items:center;gap:10px;">
      <span style="width:24px;height:24px;border-radius:50%;border:2px solid var(--kit-border,#E2E8F0);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text-2,#475569);flex-shrink:0;">C</span>
      <span>Proximity</span>
    </div>
    <div style="padding:12px 14px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);color:var(--kit-text,#0F172A);cursor:pointer;display:flex;align-items:center;gap:10px;">
      <span style="width:24px;height:24px;border-radius:50%;border:2px solid var(--kit-border,#E2E8F0);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text-2,#475569);flex-shrink:0;">D</span>
      <span>Alignment</span>
    </div>
  </div>
  <div style="width:100%;height:44px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border-radius:var(--kit-radius,8px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);cursor:pointer;">Next Question</div>
</div>
