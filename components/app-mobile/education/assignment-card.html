<!--
  @name: Assignment Card
  @kit: app-mobile
  @width: 360
  @height: 120
  @tags: assignment, task, homework, education
-->
<div data-component="Assignment Card" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:14px 16px;display:flex;align-items:center;gap:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="width:44px;height:44px;border-radius:var(--kit-radius,8px);background:var(--kit-surface,#F8FAFC);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--kit-text-2,#475569);">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
  </div>
  <div style="flex:1;min-width:0;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Design a Landing Page</span>
      <span style="padding:2px 8px;background:rgba(245,158,11,0.1);color:var(--kit-warning,#F59E0B);font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);border-radius:var(--kit-radius-full,9999px);white-space:nowrap;">In Progress</span>
    </div>
    <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);margin-bottom:2px;">UI/UX Design Fundamentals</div>
    <div style="display:flex;align-items:center;gap:4px;color:var(--kit-text-2,#475569);">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span style="font-size:var(--kit-text-xs,12px);">Due Mar 30</span>
    </div>
  </div>
  <div style="height:36px;padding:0 16px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border-radius:var(--kit-radius,8px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);cursor:pointer;flex-shrink:0;">Submit</div>
</div>
