<!--
  @name: Student Dashboard
  @kit: app-mobile
  @width: 360
  @height: 300
  @tags: student, dashboard, stats, education
-->
<div data-component="Student Dashboard" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);padding:20px 16px;display:flex;flex-direction:column;gap:16px;">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div>
      <div style="font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">Hi, Alex!</div>
      <div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
        <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">5 day streak</span>
        <span style="font-size:16px;">&#128293;</span>
      </div>
    </div>
    <img src="https://placehold.jp/40x40.png" style="width:40px;height:40px;border-radius:var(--kit-radius-full,9999px);object-fit:cover;display:block;" alt="Avatar"/>
  </div>
  <div style="display:flex;gap:10px;">
    <div style="flex:1;background:var(--kit-surface,#F8FAFC);border-radius:var(--kit-radius-md,12px);padding:14px;text-align:center;">
      <div style="width:32px;height:32px;border-radius:var(--kit-radius,8px);background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary,#6366F1)" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div style="font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">4</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Courses</div>
    </div>
    <div style="flex:1;background:var(--kit-surface,#F8FAFC);border-radius:var(--kit-radius-md,12px);padding:14px;text-align:center;">
      <div style="width:32px;height:32px;border-radius:var(--kit-radius,8px);background:rgba(59,130,246,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div style="font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">28</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Hours</div>
    </div>
    <div style="flex:1;background:var(--kit-surface,#F8FAFC);border-radius:var(--kit-radius-md,12px);padding:14px;text-align:center;">
      <div style="width:32px;height:32px;border-radius:var(--kit-radius,8px);background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      </div>
      <div style="font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">2</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Certificates</div>
    </div>
  </div>
  <div>
    <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);margin-bottom:10px;">Continue Learning</div>
    <div style="display:flex;align-items:center;gap:12px;background:var(--kit-bg,#FFFFFF);padding:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
      <img src="https://placehold.jp/56x56.png" style="width:56px;height:56px;border-radius:var(--kit-radius,8px);object-fit:cover;display:block;flex-shrink:0;" alt="Course"/>
      <div style="flex:1;min-width:0;">
        <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);margin-bottom:4px;">UI/UX Design Fundamentals</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;height:4px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
            <div style="width:65%;height:100%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-full,9999px);"></div>
          </div>
          <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);flex-shrink:0;">65%</span>
        </div>
      </div>
    </div>
  </div>
</div>
