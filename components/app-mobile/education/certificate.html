<!--
  @name: Certificate
  @kit: app-mobile
  @width: 500
  @height: 350
  @tags: certificate, achievement, education, award
-->
<div data-component="Certificate" style="width:100%;max-width:500px;height:350px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);border:3px solid var(--kit-primary,#6366F1);border-radius:var(--kit-radius-lg,16px);padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;">
  <!-- Corner ornaments -->
  <div style="position:absolute;top:8px;left:8px;right:8px;bottom:8px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius-md,12px);pointer-events:none;"></div>
  <!-- Seal icon -->
  <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--kit-primary,#6366F1),#818CF8);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
  </div>
  <div style="font-size:var(--kit-text-xs,12px);text-transform:uppercase;letter-spacing:2px;color:var(--kit-text-3,#94A3B8);margin-bottom:4px;">Certificate of Completion</div>
  <div style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);margin-bottom:8px;">This is proudly presented to</div>
  <div style="font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-primary,#6366F1);margin-bottom:8px;">Alex Johnson</div>
  <div style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);margin-bottom:4px;">for successfully completing the course</div>
  <div style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);margin-bottom:20px;">UI/UX Design Fundamentals</div>
  <div style="display:flex;align-items:flex-end;gap:48px;">
    <div style="text-align:center;">
      <div style="width:100px;border-bottom:1px solid var(--kit-border,#E2E8F0);padding-bottom:4px;margin-bottom:4px;font-size:var(--kit-text-sm,14px);font-style:italic;color:var(--kit-text-2,#475569);">S. Miller</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Instructor</div>
    </div>
    <div style="text-align:center;">
      <div style="width:100px;border-bottom:1px solid var(--kit-border,#E2E8F0);padding-bottom:4px;margin-bottom:4px;font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Mar 26, 2026</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Date</div>
    </div>
  </div>
</div>
