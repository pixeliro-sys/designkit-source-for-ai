<!--
  @name: Grade Report
  @kit: app-mobile
  @width: 360
  @height: 300
  @tags: grade, report, score, education
-->
<div data-component="Grade Report" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:20px 16px;display:flex;flex-direction:column;gap:16px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">Term Grades</div>
    <div style="width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--kit-primary,#6366F1),#818CF8);display:flex;align-items:center;justify-content:center;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-bold,700);color:#FFFFFF;">3.8</span>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:12px;">
    <!-- Course 1 -->
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:4px;height:36px;border-radius:2px;background:var(--kit-success,#22C55E);flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">UI/UX Design</div>
        <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">96%</div>
      </div>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-success,#22C55E);">A</span>
    </div>
    <!-- Course 2 -->
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:4px;height:36px;border-radius:2px;background:var(--kit-success,#22C55E);flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Web Development</div>
        <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">92%</div>
      </div>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-success,#22C55E);">A-</span>
    </div>
    <!-- Course 3 -->
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:4px;height:36px;border-radius:2px;background:var(--kit-info,#3B82F6);flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Data Structures</div>
        <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">87%</div>
      </div>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-info,#3B82F6);">B+</span>
    </div>
    <!-- Course 4 -->
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:4px;height:36px;border-radius:2px;background:var(--kit-info,#3B82F6);flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Digital Marketing</div>
        <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">84%</div>
      </div>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-info,#3B82F6);">B</span>
    </div>
  </div>
</div>
