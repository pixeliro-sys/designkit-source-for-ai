<!--
  @name: Lesson Progress
  @kit: app-mobile
  @width: 360
  @height: 64
  @tags: lesson, progress, learning, education
-->
<div data-component="Lesson Progress" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);padding:12px 16px;display:flex;align-items:center;gap:12px;">
  <div style="width:40px;height:40px;border-radius:var(--kit-radius-full,9999px);background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--kit-primary,#6366F1)" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>
  </div>
  <div style="flex:1;min-width:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Lesson 5: Color Theory</span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">15 min</span>
    </div>
    <div style="width:100%;height:4px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
      <div style="width:60%;height:100%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-full,9999px);"></div>
    </div>
  </div>
</div>
