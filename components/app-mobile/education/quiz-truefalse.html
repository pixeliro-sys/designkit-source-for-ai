<!--
  @name: Quiz — True/False
  @kit: app-mobile
  @width: 360
  @height: 220
  @tags: quiz, true false, education
-->
<div data-component="Quiz — True/False" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:20px 16px;display:flex;flex-direction:column;gap:16px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-primary,#6366F1);">Question 7 of 10</span>
    <div style="width:80px;height:4px;background:var(--kit-surface-2,#F1F5F9);border-radius:var(--kit-radius-full,9999px);overflow:hidden;">
      <div style="width:70%;height:100%;background:var(--kit-primary,#6366F1);border-radius:var(--kit-radius-full,9999px);"></div>
    </div>
  </div>
  <div style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);line-height:1.4;">White space is considered wasted space in UI design.</div>
  <div style="display:flex;gap:12px;">
    <div style="flex:1;height:56px;border:2px solid var(--kit-success,#22C55E);border-radius:var(--kit-radius-md,12px);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:rgba(34,197,94,0.05);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success,#22C55E)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-success,#22C55E);">True</span>
    </div>
    <div style="flex:1;height:56px;border:2px solid var(--kit-danger,#EF4444);border-radius:var(--kit-radius-md,12px);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:rgba(239,68,68,0.05);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-danger,#EF4444)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-danger,#EF4444);">False</span>
    </div>
  </div>
</div>
