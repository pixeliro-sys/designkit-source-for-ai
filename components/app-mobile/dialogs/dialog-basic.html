<!--
  @name: Dialog — Basic
  @category: dialogs
  @kit: app-mobile
  @width: 312
  @height: 200
  @tags: dialog, modal, alert, confirm
-->
<div data-component="Dialog — Basic" style="width:312px;background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-xl, 28px);box-shadow:var(--kit-shadow-lg, 0 10px 24px rgba(0,0,0,0.08),0 4px 8px rgba(0,0,0,0.04));padding:24px;box-sizing:border-box;font-family:var(--kit-font, system-ui, -apple-system, sans-serif)">
  <div style="font-size:var(--kit-text-xl, 24px);font-weight:var(--kit-font-normal, 400);color:var(--kit-text, #0F172A);margin-bottom:16px">Dialog Title</div>
  <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-bottom:24px;line-height:1.5">A dialog is a modal window that appears in front of app content to provide critical information or ask for a decision.</div>
  <div style="display:flex;justify-content:flex-end;gap:8px">
    <div style="padding:8px 16px;border-radius:20px;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-primary, #6366F1);cursor:pointer">Cancel</div>
    <div style="padding:8px 16px;border-radius:20px;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-primary, #6366F1);cursor:pointer">Confirm</div>
  </div>
</div>
