<!--
  @name: Dialog — Full Screen
  @category: dialogs
  @kit: app-mobile
  @width: 360
  @height: 640
  @tags: dialog, fullscreen, modal, form
-->
<div data-component="Dialog — Full Screen" style="width:100%;height:100%;background:var(--kit-bg, #FFFFFF);font-family:var(--kit-font, system-ui, -apple-system, sans-serif);display:flex;flex-direction:column">
  <div style="display:flex;align-items:center;height:56px;padding:0 8px;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="padding:12px;cursor:pointer;color:var(--kit-text, #0F172A);display:flex;align-items:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div style="flex:1;font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-normal, 400);color:var(--kit-text, #0F172A);margin-left:4px">Full Screen Dialog</div>
    <div style="padding:8px 16px;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-primary, #6366F1);cursor:pointer">Save</div>
  </div>
  <div style="flex:1;padding:24px 16px;color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px)">Dialog content area</div>
</div>
