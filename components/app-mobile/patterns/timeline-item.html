<!--
  @name: Timeline Item
  @category: patterns
  @kit: app-mobile
  @width: 360
  @height: 80
  @tags: timeline, activity, history, event, log
-->
<div data-component="Timeline Item" style="display:flex;gap:12px;padding:0 16px;font-family:var(--kit-font, system-ui, -apple-system, sans-serif)">
  <div style="display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0">
    <div style="width:12px;height:12px;border-radius:6px;background:var(--kit-primary, #6366F1);flex-shrink:0"></div>
    <div style="width:2px;flex:1;background:var(--kit-border, #E2E8F0)"></div>
  </div>
  <div style="flex:1;padding-bottom:24px">
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Payment received</div>
    <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569);margin-top:2px">Invoice #4023 — $230.00 from Sarah Chen</div>
    <div style="font-size:var(--kit-text-xs, 11px);color:var(--kit-text-3, #94A3B8);margin-top:4px">2 hours ago</div>
  </div>
</div>
