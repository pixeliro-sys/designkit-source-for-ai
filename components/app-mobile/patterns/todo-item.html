<!--
  @name: Todo Item — Checkbox + Text + Date
  @category: patterns
  @kit: app-mobile
  @width: 360
  @height: 56
  @tags: todo, task, checkbox, productivity, list
-->
<div data-component="Todo Item — Checkbox + Text + Date" style="display:flex;align-items:center;width:100%;height:56px;padding:0 16px;gap:12px;box-sizing:border-box;font-family:var(--kit-font, system-ui, -apple-system, sans-serif)">
  <div style="width:22px;height:22px;border-radius:var(--kit-radius-sm, 4px);border:2px solid var(--kit-border-strong, #CBD5E1);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0"></div>
  <div style="flex:1;min-width:0">
    <div style="font-size:var(--kit-text-md, 15px);color:var(--kit-text, #0F172A)">Design new homepage layout</div>
  </div>
  <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
    <div style="font-size:11px;color:var(--kit-danger, #EF4444);background:var(--kit-danger-bg, #FEF2F2);padding:2px 8px;border-radius:4px">Mar 25</div>
    <div style="width:8px;height:8px;border-radius:4px;background:#FBBF24"></div>
  </div>
</div>
