<!--
  @name: Side Sheet
  @category: surfaces
  @kit: app-mobile
  @width: 320
  @height: 640
  @tags: side-sheet, panel, drawer, surface
-->
<div data-component="Side Sheet" style="width:320px;height:100%;background:var(--kit-bg, #FFFFFF);border-left:1px solid var(--kit-border, #E2E8F0);font-family:var(--kit-font, system-ui, -apple-system, sans-serif);display:flex;flex-direction:column;box-sizing:border-box">
  <div style="display:flex;align-items:center;height:64px;padding:0 16px;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:1;font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Details</div>
    <div style="padding:8px;cursor:pointer;color:var(--kit-text-2, #475569);display:flex;align-items:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>
  <div style="flex:1;padding:16px;overflow-y:auto">
    <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Sheet content area</div>
  </div>
</div>
