<!--
  @name: Lab Results Row
  @kit: app-mobile
  @width: 360
  @height: 72
  @tags: lab, results, test, healthcare
-->
<div data-component="Lab Results Row" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:14px 16px;display:flex;align-items:center;gap:12px;">
  <div style="width:40px;height:40px;border-radius:var(--kit-radius,8px);background:var(--kit-surface,#F8FAFC);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--kit-text-2,#475569);">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
  </div>
  <div style="flex:1;min-width:0;">
    <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Blood Glucose</div>
    <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--kit-success,#22C55E);flex-shrink:0;"></span>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Normal (70–100)</span>
    </div>
  </div>
  <div style="text-align:right;flex-shrink:0;">
    <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">95 mg/dL</div>
    <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);margin-top:1px;">Mar 25</div>
  </div>
</div>
