<!--
  @name: Appointment Card
  @kit: app-mobile
  @width: 360
  @height: 120
  @tags: appointment, doctor, booking, healthcare
-->
<div data-component="Appointment Card" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:14px 16px;display:flex;align-items:center;gap:12px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <img src="https://placehold.jp/48x48.png" style="width:48px;height:48px;border-radius:var(--kit-radius-full,9999px);object-fit:cover;flex-shrink:0;display:block;" alt="Doctor"/>
  <div style="flex:1;min-width:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
      <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Dr. Sarah Chen</span>
      <span style="padding:2px 8px;background:rgba(34,197,94,0.1);color:var(--kit-success,#22C55E);font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);border-radius:var(--kit-radius-full,9999px);">Confirmed</span>
    </div>
    <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-2,#475569);margin-bottom:8px;">Cardiologist</div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:4px;color:var(--kit-text-3,#94A3B8);">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span style="font-size:var(--kit-text-xs,12px);">Mar 28, 2:30 PM</span>
      </div>
      <div style="width:32px;height:32px;border-radius:var(--kit-radius,8px);background:var(--kit-surface-2,#F1F5F9);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--kit-primary,#6366F1);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
    </div>
  </div>
</div>
