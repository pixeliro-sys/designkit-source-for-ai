<!--
  @name: Doctor Profile Card
  @kit: app-mobile
  @width: 360
  @height: 180
  @tags: doctor, profile, healthcare, medical
-->
<div data-component="Doctor Profile Card" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);padding:20px 16px;display:flex;flex-direction:column;gap:16px;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <div style="display:flex;gap:14px;align-items:center;">
    <img src="https://placehold.jp/72x72.png" style="width:72px;height:72px;border-radius:var(--kit-radius-full,9999px);object-fit:cover;flex-shrink:0;display:block;" alt="Doctor"/>
    <div style="flex:1;min-width:0;">
      <div style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);margin-bottom:2px;">Dr. Sarah Chen</div>
      <div style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);margin-bottom:2px;">Cardiologist</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);margin-bottom:6px;">Mount Sinai Hospital</div>
      <div style="display:flex;align-items:center;gap:4px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">4.9</span>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div style="flex:1;text-align:center;padding:8px 0;background:var(--kit-surface,#F8FAFC);border-radius:var(--kit-radius,8px);">
      <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">12</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Years Exp.</div>
    </div>
    <div style="flex:1;text-align:center;padding:8px 0;background:var(--kit-surface,#F8FAFC);border-radius:var(--kit-radius,8px);">
      <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">2.4K</div>
      <div style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);">Patients</div>
    </div>
    <div style="flex:2;height:40px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border-radius:var(--kit-radius,8px);display:flex;align-items:center;justify-content:center;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);cursor:pointer;">Book Appointment</div>
  </div>
</div>
