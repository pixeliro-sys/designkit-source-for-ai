<div data-component="Checkbox" style="display:flex;align-items:center;gap:12px;height:40px;font-family:var(--kit-font, system-ui, -apple-system, sans-serif);cursor:pointer">
  <div style="width:20px;height:20px;border-radius:var(--kit-radius-sm, 4px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <span style="font-size:var(--kit-text-md, 16px);color:var(--kit-text, #0F172A)">Checkbox label</span>
</div>
