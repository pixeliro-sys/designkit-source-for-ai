<!--
  @name: Radio Button
  @category: toggles
  @kit: app-mobile
  @width: 200
  @height: 40
  @tags: radio, button, form, toggle
-->
<div data-component="Radio Button" style="display:flex;align-items:center;gap:12px;height:40px;font-family:var(--kit-font, system-ui, -apple-system, sans-serif);cursor:pointer">
  <div style="width:20px;height:20px;border-radius:10px;border:2px solid var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center;box-sizing:border-box">
    <div style="width:10px;height:10px;border-radius:5px;background:var(--kit-primary, #6366F1)"></div>
  </div>
  <span style="font-size:var(--kit-text-md, 16px);color:var(--kit-text, #0F172A)">Radio label</span>
</div>
