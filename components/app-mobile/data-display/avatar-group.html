<!--
  @name: Avatar Group
  @kit: app-mobile
  @width: 200
  @height: 40
  @tags: avatar, group, users, stack
-->
<div data-component="Avatar Group" style="width:100%;box-sizing:border-box;display:flex;align-items:center;font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Avatar 1 -->
  <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;border:2px solid var(--kit-bg, #FFFFFF);flex-shrink:0;position:relative;z-index:4;">
    <img src="https://placehold.jp/3d4070/ffffff/36x36?text=A" alt="User 1" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>

  <!-- Avatar 2 -->
  <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;border:2px solid var(--kit-bg, #FFFFFF);flex-shrink:0;position:relative;z-index:3;margin-left:-10px;">
    <img src="https://placehold.jp/704070/ffffff/36x36?text=B" alt="User 2" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>

  <!-- Avatar 3 -->
  <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;border:2px solid var(--kit-bg, #FFFFFF);flex-shrink:0;position:relative;z-index:2;margin-left:-10px;">
    <img src="https://placehold.jp/407050/ffffff/36x36?text=C" alt="User 3" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>

  <!-- Avatar 4 -->
  <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;border:2px solid var(--kit-bg, #FFFFFF);flex-shrink:0;position:relative;z-index:1;margin-left:-10px;">
    <img src="https://placehold.jp/704040/ffffff/36x36?text=D" alt="User 4" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>

  <!-- Counter -->
  <div style="width:36px;height:36px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);border:2px solid var(--kit-bg, #FFFFFF);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:0;margin-left:-10px;">
    <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text-2, #475569);">+3</span>
  </div>

</div>
