<!--
  @name: Application Status
  @kit: app-mobile
  @width: 360
  @height: 80
  @tags: application, status, tracking, job
-->
<div data-component="Application Status" style="width:100%;max-width:360px;box-sizing:border-box;padding:14px 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;gap:12px;cursor:pointer">
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden;flex-shrink:0">
    <img src="https://placehold.jp/36x36.png" alt="Acme Corp" style="width:100%;height:100%;object-fit:cover;display:block"/>
  </div>
  <div style="flex:1;min-width:0">
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Acme Corp - Senior Designer</div>
    <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Applied Mar 15</div>
  </div>
  <span style="padding:4px 10px;background:rgba(99,102,241,0.1);color:var(--kit-primary, #6366F1);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);border-radius:var(--kit-radius-full, 9999px);flex-shrink:0">Interview</span>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>
</div>
