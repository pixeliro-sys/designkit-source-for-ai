<!--
  @name: Interview Schedule
  @kit: app-mobile
  @width: 360
  @height: 140
  @tags: interview, schedule, calendar, job
-->
<div data-component="Interview Schedule" style="width:100%;max-width:360px;box-sizing:border-box;padding:14px 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;gap:12px">
    <div style="width:44px;height:44px;border-radius:var(--kit-radius, 8px);background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Acme Corp</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569);margin-top:2px">Senior Designer</div>
    </div>
    <span style="padding:4px 10px;background:rgba(59,130,246,0.1);color:var(--kit-info, #3B82F6);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px);height:fit-content">Video Call</span>
  </div>
  <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--kit-border, #E2E8F0)">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-weight:var(--kit-font-medium, 500)">Mar 28 at 2:00 PM</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:6px">
        <div style="width:24px;height:24px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden"><img src="https://placehold.jp/24x24.png" alt="Interviewer" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
        <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">Sarah Chen - Design Lead</span>
      </div>
      <button style="padding:6px 16px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Join Call</button>
    </div>
  </div>
</div>
