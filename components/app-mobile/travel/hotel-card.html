<!--
  @name: Hotel Card
  @kit: app-mobile
  @width: 340
  @height: 280
  @tags: hotel, card, booking, travel
-->
<div data-component="Hotel Card" style="width:100%;max-width:340px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);overflow:hidden;box-shadow:var(--kit-shadow-sm, 0 1px 2px rgba(0,0,0,0.05))">
  <div style="position:relative;width:100%;height:160px;overflow:hidden">
    <img src="https://placehold.jp/340x160.png" alt="The Grand Palace Hotel" style="width:100%;height:100%;object-fit:cover;display:block"/>
    <div style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:var(--kit-radius-full, 9999px);background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
  </div>
  <div style="padding:12px 14px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">The Grand Palace Hotel</div>
      <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning, #F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">4.8</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-top:4px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Downtown, NYC</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <div>
        <span style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$189</span>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8)">/night</span>
      </div>
      <button style="padding:8px 20px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Book Now</button>
    </div>
  </div>
</div>
