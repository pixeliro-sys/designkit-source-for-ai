<!--
  @name: Booking Summary
  @kit: app-mobile
  @width: 360
  @height: 280
  @tags: booking, summary, confirmation, travel
-->
<div data-component="Booking Summary" style="width:100%;max-width:360px;box-sizing:border-box;padding:16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-full, 9999px);background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <span style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Booking Confirmation</span>
  </div>
  <div style="display:flex;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--kit-border, #E2E8F0);margin-bottom:12px">
    <img src="https://placehold.jp/64x64.png" alt="Hotel" style="width:64px;height:64px;border-radius:var(--kit-radius, 8px);object-fit:cover;display:block;flex-shrink:0"/>
    <div style="flex:1;min-width:0">
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">The Grand Palace Hotel</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Deluxe King Room</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569);margin-top:4px">2 Adults</div>
    </div>
  </div>
  <div style="display:flex;gap:16px;margin-bottom:14px">
    <div style="flex:1">
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-bottom:4px">Check-in</div>
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Mar 28, 2026</div>
    </div>
    <div style="flex:1">
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-bottom:4px">Check-out</div>
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Mar 31, 2026</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;padding-top:12px;border-top:1px solid var(--kit-border, #E2E8F0)">
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Subtotal (3 nights)</span>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">$567.00</span>
    </div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Taxes &amp; fees</span>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">$68.04</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding-top:8px;border-top:1px solid var(--kit-border, #E2E8F0);margin-top:4px">
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">Total</span>
      <span style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$635.04</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:8px;background:var(--kit-surface, #F8FAFC);border-radius:var(--kit-radius, 8px)">
    <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">Confirmation Code:</span>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-bold, 700);color:var(--kit-primary, #6366F1);letter-spacing:0.5px">BK-78432</span>
  </div>
</div>
