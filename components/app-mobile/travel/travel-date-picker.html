<!--
  @name: Travel Date Picker
  @kit: app-mobile
  @width: 360
  @height: 360
  @tags: date, picker, checkin, checkout, travel
-->
<div data-component="Travel Date Picker" style="width:100%;max-width:360px;box-sizing:border-box;padding:16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:14px">Select Dates</div>
  <div style="display:flex;gap:0;margin-bottom:16px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);overflow:hidden">
    <div style="flex:1;padding:10px;text-align:center;background:var(--kit-primary, #6366F1);color:#FFFFFF">
      <div style="font-size:var(--kit-text-xs, 12px);opacity:0.8">Check-in</div>
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);margin-top:2px">Mar 28</div>
    </div>
    <div style="flex:1;padding:10px;text-align:center;background:var(--kit-surface, #F8FAFC)">
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">Check-out</div>
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-top:2px">Mar 31</div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">March 2026</span>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7, 1fr);gap:2px;text-align:center;margin-bottom:4px">
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Su</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Mo</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Tu</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">We</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Th</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Fr</span>
    <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);padding:4px 0">Sa</span>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7, 1fr);gap:2px;text-align:center">
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">1</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">2</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">3</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">4</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">5</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">6</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">7</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">8</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">9</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">10</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">11</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">12</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">13</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">14</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">15</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">16</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">17</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">18</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">19</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">20</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">21</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">22</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">23</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">24</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">25</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">26</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);padding:8px 0">27</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:#FFFFFF;padding:8px 0;background:var(--kit-primary, #6366F1);border-radius:var(--kit-radius-full, 9999px)">28</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-primary, #6366F1);padding:8px 0;background:rgba(99,102,241,0.1)">29</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-primary, #6366F1);padding:8px 0;background:rgba(99,102,241,0.1)">30</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:#FFFFFF;padding:8px 0;background:var(--kit-primary, #6366F1);border-radius:var(--kit-radius-full, 9999px)">31</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;margin-bottom:14px">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569)">3 nights</span>
  </div>
  <button style="width:100%;padding:12px 0;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Confirm Dates</button>
</div>
