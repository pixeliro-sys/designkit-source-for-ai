<!--
  @name: Flight Card
  @kit: app-mobile
  @width: 360
  @height: 160
  @tags: flight, card, booking, travel, airline
-->
<div data-component="Flight Card" style="width:100%;max-width:360px;box-sizing:border-box;padding:16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
    <div style="width:28px;height:28px;border-radius:var(--kit-radius-sm, 4px);background:var(--kit-surface-2, #F1F5F9);display:flex;align-items:center;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-primary, #6366F1)" stroke="none"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
    </div>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569)">United Airlines</span>
    <span style="margin-left:auto;padding:3px 8px;background:var(--kit-surface, #F8FAFC);border-radius:var(--kit-radius-sm, 4px);font-size:var(--kit-text-xs, 12px);color:var(--kit-success, #22C55E);font-weight:var(--kit-font-medium, 500)">Direct</span>
  </div>
  <div style="display:flex;align-items:center;gap:0;margin-bottom:14px">
    <div style="flex:1;text-align:left">
      <div style="font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">08:30</div>
      <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8);font-weight:var(--kit-font-medium, 500)">SFO</div>
    </div>
    <div style="flex:2;display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 8px">
      <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">5h 15m</span>
      <div style="width:100%;display:flex;align-items:center;gap:0">
        <div style="flex:1;height:1px;border-top:2px dashed var(--kit-border, #E2E8F0)"></div>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--kit-primary, #6366F1)" stroke="none"><path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
        <div style="flex:1;height:1px;border-top:2px dashed var(--kit-border, #E2E8F0)"></div>
      </div>
    </div>
    <div style="flex:1;text-align:right">
      <div style="font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">16:45</div>
      <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8);font-weight:var(--kit-font-medium, 500)">JFK</div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--kit-border, #E2E8F0)">
    <div>
      <span style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$349</span>
      <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-left:4px">per person</span>
    </div>
    <button style="padding:8px 20px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Select</button>
  </div>
</div>
