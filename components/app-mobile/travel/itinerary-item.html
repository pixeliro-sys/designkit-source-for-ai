<!--
  @name: Trip Itinerary Item
  @kit: app-mobile
  @width: 360
  @height: 100
  @tags: itinerary, trip, plan, travel
-->
<div data-component="Trip Itinerary Item" style="width:100%;max-width:360px;box-sizing:border-box;padding:0 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);display:flex;gap:12px">
  <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:40px">
    <div style="width:32px;height:32px;border-radius:var(--kit-radius, 8px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-bold, 700);flex-shrink:0">Day 1</div>
    <div style="width:2px;flex:1;background:var(--kit-border, #E2E8F0);margin-top:4px"></div>
  </div>
  <div style="flex:1;min-width:0;padding-bottom:16px">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-primary, #6366F1)">9:00 AM</span>
      <span style="width:4px;height:4px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-border, #E2E8F0)"></span>
      <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">2 hours</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface, #F8FAFC);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Visit Eiffel Tower</div>
        <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Paris, France</div>
      </div>
    </div>
  </div>
</div>
