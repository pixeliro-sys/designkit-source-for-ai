<!--
@name: Empty Search
@kit: common
@width: 200
@height: 200
@tags: empty, search, no-results, magnifying-glass, placeholder
-->
<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Magnifying glass circle -->
  <circle cx="90" cy="85" r="38" stroke="currentColor" stroke-width="1.5" />
  <!-- Glass shine -->
  <path d="M72 70 Q78 62 88 65" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <!-- Handle -->
  <line x1="118" y1="113" x2="145" y2="140" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  <!-- X inside the glass -->
  <line x1="78" y1="73" x2="102" y2="97" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
  <line x1="102" y1="73" x2="78" y2="97" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
  <!-- Decorative question marks / dots -->
  <circle cx="155" cy="60" r="2" fill="currentColor" opacity="0.15" />
  <circle cx="45" cy="120" r="2.5" fill="currentColor" opacity="0.12" />
  <circle cx="160" cy="95" r="1.5" fill="currentColor" opacity="0.1" />
  <!-- Small floating lines suggesting no result -->
  <line x1="50" y1="155" x2="80" y2="155" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.15" />
  <line x1="90" y1="155" x2="110" y2="155" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.15" />
  <line x1="120" y1="155" x2="150" y2="155" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.15" />
</svg>
