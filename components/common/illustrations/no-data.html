<!--
@name: No Data
@kit: common
@width: 200
@height: 200
@tags: empty, no-data, chart, analytics, placeholder
-->
<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chart axes -->
  <line x1="40" y1="30" x2="40" y2="150" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  <line x1="40" y1="150" x2="170" y2="150" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  <!-- Y-axis tick marks -->
  <line x1="36" y1="60" x2="40" y2="60" stroke="currentColor" stroke-width="1" opacity="0.3" />
  <line x1="36" y1="90" x2="40" y2="90" stroke="currentColor" stroke-width="1" opacity="0.3" />
  <line x1="36" y1="120" x2="40" y2="120" stroke="currentColor" stroke-width="1" opacity="0.3" />
  <!-- Grid lines (dashed, faint) -->
  <line x1="40" y1="60" x2="170" y2="60" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.1" />
  <line x1="40" y1="90" x2="170" y2="90" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.1" />
  <line x1="40" y1="120" x2="170" y2="120" stroke="currentColor" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.1" />
  <!-- Ghost bar outlines (empty data) -->
  <rect x="55" y="80" width="18" height="70" rx="3" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.2" />
  <rect x="85" y="60" width="18" height="90" rx="3" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.2" />
  <rect x="115" y="95" width="18" height="55" rx="3" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.2" />
  <rect x="145" y="70" width="18" height="80" rx="3" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.2" />
  <!-- "No data" slash through -->
  <line x1="55" y1="130" x2="163" y2="50" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.25" />
  <!-- Small decorative elements -->
  <circle cx="105" cy="175" r="2" fill="currentColor" opacity="0.1" />
  <circle cx="85" cy="175" r="1.5" fill="currentColor" opacity="0.08" />
  <circle cx="125" cy="175" r="1.5" fill="currentColor" opacity="0.08" />
</svg>
