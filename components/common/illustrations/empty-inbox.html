<!--
@name: Empty Inbox
@kit: common
@width: 200
@height: 200
@tags: empty, inbox, mailbox, no-messages, placeholder
-->
<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Mailbox body -->
  <rect x="50" y="70" width="100" height="80" rx="8" stroke="currentColor" stroke-width="1.5" />
  <!-- Mailbox lid open -->
  <path d="M50 78 L100 50 L150 78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Mail slot line -->
  <line x1="70" y1="110" x2="130" y2="110" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
  <line x1="80" y1="122" x2="120" y2="122" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <!-- Flag on side -->
  <line x1="150" y1="85" x2="165" y2="85" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  <line x1="165" y1="85" x2="165" y2="100" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  <path d="M165 85 L175 90 L165 95" fill="currentColor" opacity="0.3" />
  <!-- Small decorative dots -->
  <circle cx="60" cy="60" r="2" fill="currentColor" opacity="0.15" />
  <circle cx="145" cy="55" r="1.5" fill="currentColor" opacity="0.12" />
  <circle cx="40" cy="90" r="1.5" fill="currentColor" opacity="0.1" />
  <!-- Ground shadow -->
  <ellipse cx="100" cy="160" rx="50" ry="6" fill="currentColor" opacity="0.08" />
  <!-- "Empty" indication — small dashed lines inside -->
  <line x1="85" y1="95" x2="115" y2="95" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.2" />
</svg>
