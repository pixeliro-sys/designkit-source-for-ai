<!--
@name: Empty Cart
@kit: common
@width: 200
@height: 200
@tags: empty, cart, shopping, e-commerce, placeholder
-->
<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Cart body -->
  <path d="M45 60 L55 60 L70 130 L150 130 L165 75 L65 75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Cart handle -->
  <path d="M35 55 L45 60" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
  <!-- Cart inner lines (empty shelves) -->
  <line x1="72" y1="95" x2="160" y2="95" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.2" stroke-dasharray="6 4" />
  <line x1="74" y1="112" x2="155" y2="112" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.2" stroke-dasharray="6 4" />
  <!-- Wheels -->
  <circle cx="85" cy="145" r="8" stroke="currentColor" stroke-width="1.5" />
  <circle cx="85" cy="145" r="2.5" fill="currentColor" opacity="0.3" />
  <circle cx="140" cy="145" r="8" stroke="currentColor" stroke-width="1.5" />
  <circle cx="140" cy="145" r="2.5" fill="currentColor" opacity="0.3" />
  <!-- Small dust/empty particles -->
  <circle cx="100" cy="100" r="1.5" fill="currentColor" opacity="0.1" />
  <circle cx="125" cy="90" r="1" fill="currentColor" opacity="0.1" />
  <circle cx="110" cy="115" r="1.5" fill="currentColor" opacity="0.08" />
  <!-- Ground line -->
  <line x1="55" y1="160" x2="170" y2="160" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.1" />
</svg>
