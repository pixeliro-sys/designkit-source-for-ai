<!--
@name: Browser Chrome
@kit: common
@width: 400
@height: 36
@tags: browser, chrome, window, mockup, web, toolbar
-->
<svg viewBox="0 0 400 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser bar background -->
  <rect x="0" y="0" width="400" height="36" rx="8" fill="currentColor" opacity="0.05" />
  <!-- Bottom border -->
  <line x1="0" y1="36" x2="400" y2="36" stroke="currentColor" stroke-width="0.5" opacity="0.1" />
  <!-- Traffic light dots -->
  <circle cx="16" cy="18" r="5" fill="currentColor" opacity="0.15" />
  <circle cx="32" cy="18" r="5" fill="currentColor" opacity="0.15" />
  <circle cx="48" cy="18" r="5" fill="currentColor" opacity="0.15" />
  <!-- Inner dot accents for traffic lights -->
  <circle cx="16" cy="18" r="2" fill="currentColor" opacity="0.08" />
  <circle cx="32" cy="18" r="2" fill="currentColor" opacity="0.08" />
  <circle cx="48" cy="18" r="2" fill="currentColor" opacity="0.08" />
  <!-- URL bar -->
  <rect x="70" y="8" width="260" height="20" rx="6" stroke="currentColor" stroke-width="0.75" opacity="0.15" />
  <rect x="70" y="8" width="260" height="20" rx="6" fill="currentColor" opacity="0.03" />
  <!-- Lock icon in URL bar -->
  <rect x="80" y="14" width="6" height="5" rx="1" stroke="currentColor" stroke-width="0.75" opacity="0.3" />
  <path d="M81.5 14 L81.5 12 Q81.5 10 83 10 Q84.5 10 84.5 12 L84.5 14" stroke="currentColor" stroke-width="0.75" opacity="0.3" />
  <!-- URL text placeholder -->
  <line x1="92" y1="18" x2="160" y2="18" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.15" />
  <!-- Right side buttons -->
  <circle cx="350" cy="18" r="3" stroke="currentColor" stroke-width="0.75" opacity="0.15" />
  <line x1="349" y1="18" x2="351" y2="18" stroke="currentColor" stroke-width="0.75" opacity="0.15" />
  <line x1="350" y1="17" x2="350" y2="19" stroke="currentColor" stroke-width="0.75" opacity="0.15" />
  <!-- Menu dots -->
  <circle cx="375" cy="14" r="1" fill="currentColor" opacity="0.2" />
  <circle cx="375" cy="18" r="1" fill="currentColor" opacity="0.2" />
  <circle cx="375" cy="22" r="1" fill="currentColor" opacity="0.2" />
</svg>
