<!--
@name: Phone Frame
@kit: common
@width: 280
@height: 560
@tags: phone, device, frame, mobile, mockup, smartphone
-->
<svg viewBox="0 0 280 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer device frame -->
  <rect x="8" y="8" width="264" height="544" rx="36" stroke="currentColor" stroke-width="1.5" />
  <!-- Inner screen area -->
  <rect x="16" y="16" width="248" height="528" rx="30" stroke="currentColor" stroke-width="0.75" opacity="0.3" />
  <!-- Screen fill -->
  <rect x="17" y="17" width="246" height="526" rx="29" fill="currentColor" opacity="0.02" />
  <!-- Notch / Dynamic Island -->
  <rect x="105" y="24" width="70" height="22" rx="11" fill="currentColor" opacity="0.08" />
  <!-- Camera dot inside notch -->
  <circle cx="155" cy="35" r="4" fill="currentColor" opacity="0.12" />
  <circle cx="155" cy="35" r="2" fill="currentColor" opacity="0.06" />
  <!-- Bottom home indicator -->
  <rect x="110" y="528" width="60" height="4" rx="2" fill="currentColor" opacity="0.15" />
  <!-- Side buttons -->
  <!-- Volume up -->
  <rect x="0" y="140" width="3" height="30" rx="1.5" fill="currentColor" opacity="0.1" />
  <!-- Volume down -->
  <rect x="0" y="180" width="3" height="30" rx="1.5" fill="currentColor" opacity="0.1" />
  <!-- Power button -->
  <rect x="277" y="160" width="3" height="40" rx="1.5" fill="currentColor" opacity="0.1" />
</svg>
