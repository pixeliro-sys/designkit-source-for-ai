<!--
@name: Laptop Frame
@kit: common
@width: 500
@height: 320
@tags: laptop, device, frame, computer, mockup, desktop
-->
<svg viewBox="0 0 500 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Screen lid -->
  <rect x="60" y="10" width="380" height="240" rx="10" stroke="currentColor" stroke-width="1.5" />
  <!-- Screen bezel inner -->
  <rect x="72" y="22" width="356" height="216" rx="4" stroke="currentColor" stroke-width="0.75" opacity="0.3" />
  <!-- Screen fill -->
  <rect x="73" y="23" width="354" height="214" rx="3" fill="currentColor" opacity="0.02" />
  <!-- Camera dot -->
  <circle cx="250" cy="16" r="2.5" fill="currentColor" opacity="0.15" />
  <!-- Base / keyboard section -->
  <path d="M30 255 L40 250 L460 250 L470 255 L470 280 Q470 290 460 290 L40 290 Q30 290 30 280Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
  <!-- Keyboard base fill -->
  <path d="M30 255 L40 250 L460 250 L470 255 L470 280 Q470 290 460 290 L40 290 Q30 290 30 280Z" fill="currentColor" opacity="0.03" />
  <!-- Touchpad -->
  <rect x="195" y="262" width="110" height="20" rx="4" stroke="currentColor" stroke-width="0.75" opacity="0.15" />
  <!-- Hinge line -->
  <line x1="50" y1="252" x2="450" y2="252" stroke="currentColor" stroke-width="0.5" opacity="0.1" />
  <!-- Keyboard keys suggestion (abstract lines) -->
  <line x1="90" y1="262" x2="170" y2="262" stroke="currentColor" stroke-width="0.5" opacity="0.08" />
  <line x1="90" y1="270" x2="160" y2="270" stroke="currentColor" stroke-width="0.5" opacity="0.08" />
  <line x1="330" y1="262" x2="410" y2="262" stroke="currentColor" stroke-width="0.5" opacity="0.08" />
  <line x1="340" y1="270" x2="400" y2="270" stroke="currentColor" stroke-width="0.5" opacity="0.08" />
  <!-- Bottom edge shadow -->
  <ellipse cx="250" cy="300" rx="180" ry="4" fill="currentColor" opacity="0.05" />
</svg>
