<svg viewBox="0 0 430 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Time (left side) -->
  <text x="16" y="17" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="currentColor" opacity="0.85">10:30</text>
  <!-- Notification icons area (left of center) -->
  <!-- Small mail icon -->
  <rect x="70" y="7" width="12" height="8" rx="1" stroke="currentColor" stroke-width="0.75" opacity="0.4" />
  <path d="M70 7 L76 12 L82 7" stroke="currentColor" stroke-width="0.75" opacity="0.4" />
  <!-- Signal bars (right side) -->
  <rect x="338" y="14" width="2.5" height="4" rx="0.5" fill="currentColor" opacity="0.4" />
  <rect x="342" y="12" width="2.5" height="6" rx="0.5" fill="currentColor" opacity="0.5" />
  <rect x="346" y="9" width="2.5" height="9" rx="0.5" fill="currentColor" opacity="0.65" />
  <rect x="350" y="6" width="2.5" height="12" rx="0.5" fill="currentColor" opacity="0.85" />

  <path d="M366 16 Q372 8 378 16" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" opacity="0.85" />
  <path d="M369 14 Q372 10 375 14" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.65" />
  <circle cx="372" cy="17" r="1.2" fill="currentColor" opacity="0.85" />
  <!-- Battery -->
  <rect x="392" y="7" width="20" height="10" rx="2" stroke="currentColor" stroke-width="0.75" opacity="0.5" />
  <rect x="394" y="9" width="14" height="6" rx="1" fill="currentColor" opacity="0.35" />
  <rect x="412" y="10" width="1.5" height="4" rx="0.75" fill="currentColor" opacity="0.3" />
  <!-- Battery percentage -->
  <text x="396" y="15.5" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="currentColor" opacity="0.7">85</text>
</svg>
