<!--
@name: Abstract Lines
@kit: common
@width: 300
@height: 200
@tags: abstract, lines, geometric, decoration, background
-->
<svg viewBox="0 0 300 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Diagonal lines, top-left to bottom-right -->
  <line x1="0" y1="30" x2="80" y2="110" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.08" />
  <line x1="20" y1="0" x2="140" y2="120" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.1" />
  <line x1="60" y1="0" x2="200" y2="140" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.12" />
  <line x1="100" y1="0" x2="260" y2="160" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.1" />
  <line x1="160" y1="0" x2="300" y2="140" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.08" />
  <!-- Crossing lines, top-right to bottom-left -->
  <line x1="300" y1="20" x2="200" y2="120" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.08" />
  <line x1="280" y1="0" x2="140" y2="140" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.1" />
  <line x1="240" y1="0" x2="80" y2="160" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.12" />
  <line x1="200" y1="0" x2="40" y2="160" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.08" />
  <!-- Accent circles at intersections -->
  <circle cx="150" cy="70" r="4" fill="currentColor" opacity="0.08" />
  <circle cx="120" cy="90" r="3" fill="currentColor" opacity="0.06" />
  <circle cx="180" cy="60" r="3" fill="currentColor" opacity="0.06" />
  <!-- Horizontal accent -->
  <line x1="40" y1="170" x2="260" y2="170" stroke="currentColor" stroke-width="0.5" opacity="0.08" />
  <!-- Geometric accent shapes -->
  <rect x="145" y="95" width="10" height="10" stroke="currentColor" stroke-width="0.75" opacity="0.1" transform="rotate(45 150 100)" />
  <polygon points="80,180 90,170 100,180" stroke="currentColor" stroke-width="0.75" opacity="0.1" />
  <polygon points="200,180 210,170 220,180" stroke="currentColor" stroke-width="0.75" opacity="0.1" />
</svg>
