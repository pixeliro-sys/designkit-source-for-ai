<!--
@name: Circle Rings
@kit: common
@width: 200
@height: 200
@tags: circle, rings, concentric, decoration, background
-->
<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outermost ring -->
  <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="0.75" opacity="0.08" />
  <!-- Ring 2 -->
  <circle cx="100" cy="100" r="75" stroke="currentColor" stroke-width="0.75" opacity="0.1" />
  <!-- Ring 3 -->
  <circle cx="100" cy="100" r="60" stroke="currentColor" stroke-width="1" opacity="0.12" />
  <!-- Ring 4 -->
  <circle cx="100" cy="100" r="45" stroke="currentColor" stroke-width="1" opacity="0.15" />
  <!-- Ring 5 -->
  <circle cx="100" cy="100" r="30" stroke="currentColor" stroke-width="1.25" opacity="0.18" />
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="15" stroke="currentColor" stroke-width="1.5" opacity="0.22" />
  <!-- Center dot -->
  <circle cx="100" cy="100" r="3" fill="currentColor" opacity="0.25" />
  <!-- Accent arcs on outer rings -->
  <path d="M100 10 A90 90 0 0 1 190 100" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.15" />
  <path d="M100 190 A90 90 0 0 1 10 100" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.15" />
</svg>
