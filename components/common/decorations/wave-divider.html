<!--
@name: Wave Divider
@kit: common
@width: 400
@height: 80
@tags: wave, divider, section, separator, decoration
-->
<svg viewBox="0 0 400 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wave fill area -->
  <path d="M0 40 Q50 10 100 40 Q150 70 200 40 Q250 10 300 40 Q350 70 400 40 L400 80 L0 80 Z" fill="currentColor" opacity="0.05" />
  <!-- Primary wave line -->
  <path d="M0 40 Q50 10 100 40 Q150 70 200 40 Q250 10 300 40 Q350 70 400 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <!-- Secondary wave (offset) -->
  <path d="M0 50 Q50 25 100 50 Q150 75 200 50 Q250 25 300 50 Q350 75 400 50" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" opacity="0.12" />
  <!-- Tertiary wave (smaller) -->
  <path d="M0 35 Q50 18 100 35 Q150 52 200 35 Q250 18 300 35 Q350 52 400 35" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.08" />
</svg>
