<!--
@name: Corner Decoration
@kit: common
@width: 120
@height: 120
@tags: corner, accent, decoration, ornament, frame
-->
<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main corner L-shape -->
  <path d="M10 10 L10 80 Q10 90 20 90 L40 90" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <path d="M10 10 L80 10 Q90 10 90 20 L90 40" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.3" />
  <!-- Inner decorative curves -->
  <path d="M20 20 L20 60 Q20 70 30 70 L50 70" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.2" />
  <path d="M20 20 L60 20 Q70 20 70 30 L70 50" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.2" />
  <!-- Dot accents at corners -->
  <circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.2" />
  <circle cx="40" cy="90" r="2" fill="currentColor" opacity="0.15" />
  <circle cx="90" cy="40" r="2" fill="currentColor" opacity="0.15" />
  <!-- Small diamond at junction -->
  <rect x="17" y="17" width="6" height="6" rx="1" fill="currentColor" opacity="0.1" transform="rotate(45 20 20)" />
  <!-- Flourish curves -->
  <path d="M35 35 Q50 35 50 50" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" opacity="0.15" />
  <path d="M30 30 Q55 30 55 55" stroke="currentColor" stroke-width="0.5" stroke-linecap="round" opacity="0.1" />
  <!-- Tiny accent dots -->
  <circle cx="45" cy="45" r="1.5" fill="currentColor" opacity="0.1" />
  <circle cx="60" cy="60" r="1" fill="currentColor" opacity="0.08" />
</svg>
