<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base layer — large soft circles overlapping -->
  <circle cx="80" cy="80" r="120" fill="currentColor" opacity="0.04" />
  <circle cx="220" cy="90" r="110" fill="currentColor" opacity="0.04" />
  <circle cx="150" cy="220" r="130" fill="currentColor" opacity="0.04" />
  <!-- Mid layer — medium circles -->
  <circle cx="100" cy="120" r="80" fill="currentColor" opacity="0.04" />
  <circle cx="200" cy="150" r="85" fill="currentColor" opacity="0.04" />
  <circle cx="130" cy="200" r="75" fill="currentColor" opacity="0.04" />
  <!-- Inner layer — smaller, denser -->
  <circle cx="120" cy="100" r="50" fill="currentColor" opacity="0.05" />
  <circle cx="180" cy="130" r="55" fill="currentColor" opacity="0.05" />
  <circle cx="150" cy="190" r="45" fill="currentColor" opacity="0.05" />
  <!-- Accent layer — bright spots -->
  <circle cx="130" cy="110" r="25" fill="currentColor" opacity="0.06" />
  <circle cx="190" cy="160" r="20" fill="currentColor" opacity="0.06" />
  <circle cx="120" cy="200" r="22" fill="currentColor" opacity="0.06" />
  <!-- Mesh wireframe lines for structure -->
  <path d="M0 75 Q75 60 150 75 Q225 90 300 75" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
  <path d="M0 150 Q75 130 150 150 Q225 170 300 150" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
  <path d="M0 225 Q75 210 150 225 Q225 240 300 225" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
  <path d="M75 0 Q60 75 75 150 Q90 225 75 300" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
  <path d="M150 0 Q135 75 150 150 Q165 225 150 300" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
  <path d="M225 0 Q210 75 225 150 Q240 225 225 300" stroke="currentColor" stroke-width="0.5" opacity="0.06" />
</svg>
