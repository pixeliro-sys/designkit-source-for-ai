<!--
  @name: Pagination
  @kit: web
  @width: 400
  @height: 40
  @tags: pagination, page, navigation, controls
-->
<div data-component="Pagination" style="display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="height:36px;padding:0 12px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);display:flex;align-items:center;cursor:pointer;color:var(--kit-text-2, #475569);font-size:13px;gap:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>Prev</div>
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;background:var(--kit-primary, #6366F1);color:#fff;cursor:pointer">1</div>
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--kit-text, #0F172A);cursor:pointer">2</div>
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--kit-text, #0F172A);cursor:pointer">3</div>
  <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--kit-text-3, #94A3B8)">...</div>
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--kit-text, #0F172A);cursor:pointer">12</div>
  <div style="height:36px;padding:0 12px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);display:flex;align-items:center;cursor:pointer;color:var(--kit-text-2, #475569);font-size:13px;gap:4px">Next<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
</div>
