<!--
  @name: Settings Form — Profile
  @kit: web
  @width: 640
  @height: 400
  @tags: settings, form, profile, account, admin
-->
<div data-component="Settings Form — Profile" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:28px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:4px">Profile Settings</div>
  <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-bottom:24px">Update your personal information</div>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
    <div style="width:64px;height:64px;border-radius:32px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;flex-shrink:0">JD</div>
    <div><div style="display:inline-flex;align-items:center;height:32px;border:1px solid var(--kit-border, #E2E8F0);border-radius:6px;padding:0 12px;font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);cursor:pointer;gap:6px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload</div><div style="font-size:12px;color:var(--kit-text-3, #94A3B8);margin-top:4px">JPG, PNG. Max 2MB.</div></div>
  </div>
  <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
    <div style="flex:1;min-width:200px"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:6px">First name</div><div style="width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;box-sizing:border-box;display:flex;align-items:center;font-size:14px;color:var(--kit-text, #0F172A)">John</div></div>
    <div style="flex:1;min-width:200px"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:6px">Last name</div><div style="width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;box-sizing:border-box;display:flex;align-items:center;font-size:14px;color:var(--kit-text, #0F172A)">Doe</div></div>
  </div>
  <div style="margin-bottom:24px"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:6px">Email</div><div style="width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;box-sizing:border-box;display:flex;align-items:center;font-size:14px;color:var(--kit-text, #0F172A)">john@example.com</div></div>
  <div style="display:flex;justify-content:flex-end;gap:12px">
    <div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 20px;display:flex;align-items:center;font-size:14px;font-weight:500;color:var(--kit-text, #0F172A);cursor:pointer">Cancel</div>
    <div style="height:40px;background:var(--kit-primary, #6366F1);color:#fff;border-radius:var(--kit-radius, 8px);padding:0 20px;display:flex;align-items:center;font-size:14px;font-weight:500;cursor:pointer">Save changes</div>
  </div>
</div>
