<!--
  @name: Comparison Table — Feature Matrix
  @kit: web
  @width: 800
  @height: 300
  @tags: comparison, table, features, matrix, pricing, plans
-->
<div data-component="Comparison Table — Feature Matrix" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);overflow:hidden;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;background:var(--kit-surface, #F8FAFC);border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:2;padding:14px 20px;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Feature</div>
    <div style="flex:1;padding:14px 16px;text-align:center;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Free</div>
    <div style="flex:1;padding:14px 16px;text-align:center;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-primary, #6366F1);background:rgba(99,102,241,0.03)">Pro</div>
    <div style="flex:1;padding:14px 16px;text-align:center;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Enterprise</div>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:2;padding:12px 20px;font-size:14px;color:var(--kit-text, #0F172A)">Projects</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text-2, #475569)">3</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text, #0F172A);background:rgba(99,102,241,0.03);font-weight:500">Unlimited</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text, #0F172A);font-weight:500">Unlimited</div>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:2;padding:12px 20px;font-size:14px;color:var(--kit-text, #0F172A)">Storage</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text-2, #475569)">1 GB</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text, #0F172A);background:rgba(99,102,241,0.03);font-weight:500">50 GB</div>
    <div style="flex:1;padding:12px 16px;text-align:center;font-size:14px;color:var(--kit-text, #0F172A);font-weight:500">Unlimited</div>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:2;padding:12px 20px;font-size:14px;color:var(--kit-text, #0F172A)">Priority Support</div>
    <div style="flex:1;padding:12px 16px;text-align:center;color:var(--kit-text-3, #94A3B8)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div style="flex:1;padding:12px 16px;text-align:center;background:rgba(99,102,241,0.03)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div style="flex:1;padding:12px 16px;text-align:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
  </div>
  <div style="display:flex">
    <div style="flex:2;padding:12px 20px;font-size:14px;color:var(--kit-text, #0F172A)">SSO / SAML</div>
    <div style="flex:1;padding:12px 16px;text-align:center;color:var(--kit-text-3, #94A3B8)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div style="flex:1;padding:12px 16px;text-align:center;color:var(--kit-text-3, #94A3B8);background:rgba(99,102,241,0.03)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
    <div style="flex:1;padding:12px 16px;text-align:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
  </div>
</div>
