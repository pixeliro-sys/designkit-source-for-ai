<!--
  @name: Notification List
  @kit: web
  @width: 380
  @height: 320
  @tags: notification, list, dropdown, inbox, alerts
-->
<div data-component="Notification List" style="width:380px;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);box-shadow:0 8px 24px rgba(0,0,0,0.08);font-family:var(--kit-font, Inter, system-ui, sans-serif);overflow:hidden">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <span style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Notifications</span>
    <span style="font-size:var(--kit-text-xs, 13px);color:var(--kit-primary, #6366F1);cursor:pointer;font-weight:500">Mark all read</span>
  </div>
  <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 20px;background:rgba(99,102,241,0.03);cursor:pointer">
    <div style="width:36px;height:36px;border-radius:18px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0">SC</div>
    <div style="flex:1;min-width:0"><div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);line-height:1.4"><span style="font-weight:600">Sarah Chen</span> commented on your design</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:3px">5 minutes ago</div></div>
    <div style="width:8px;height:8px;border-radius:4px;background:var(--kit-primary, #6366F1);flex-shrink:0;margin-top:6px"></div>
  </div>
  <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 20px;cursor:pointer">
    <div style="width:36px;height:36px;border-radius:18px;background:#10B981;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div style="flex:1"><div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);line-height:1.4">Build <span style="font-weight:600">#423</span> deployed successfully</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:3px">1 hour ago</div></div>
  </div>
  <div style="display:flex;align-items:flex-start;gap:12px;padding:14px 20px;cursor:pointer">
    <div style="width:36px;height:36px;border-radius:18px;background:#F59E0B;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
    <div style="flex:1"><div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);line-height:1.4">Storage usage at <span style="font-weight:600">85%</span> capacity</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:3px">Yesterday</div></div>
  </div>
</div>
