<div data-component="Cookie Banner — Bottom" style="width:100%;display:flex;align-items:center;padding:16px 32px;box-sizing:border-box;background:var(--kit-text, #0F172A);font-family:var(--kit-font, Inter, system-ui, sans-serif);gap:24px;flex-wrap:wrap">
  <div style="flex:1;min-width:200px;font-size:var(--kit-text-sm, 14px);color:#CBD5E1;line-height:1.4">We use cookies to enhance your experience. By continuing, you agree to our <span style="color:#FFFFFF;text-decoration:underline;cursor:pointer">Privacy Policy</span>.</div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <div style="height:36px;border:1px solid #475569;border-radius:var(--kit-radius, 8px);padding:0 16px;display:flex;align-items:center;font-size:13px;font-weight:500;color:#CBD5E1;cursor:pointer">Decline</div>
    <div style="height:36px;background:#FFFFFF;border-radius:var(--kit-radius, 8px);padding:0 16px;display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);cursor:pointer">Accept All</div>
  </div>
</div>
