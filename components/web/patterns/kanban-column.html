<!--
  @name: Kanban Column — with Task Cards
  @kit: web
  @width: 300
  @height: 480
  @tags: kanban, column, board, tasks, project, drag
-->
<div data-component="Kanban Column — with Task Cards" style="width:300px;background:var(--kit-surface, #F8FAFC);border-radius:var(--kit-radius-md, 12px);padding:16px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);display:flex;flex-direction:column;gap:12px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div style="display:flex;align-items:center;gap:8px"><span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">In Progress</span><span style="background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-3, #94A3B8);font-size:12px;font-weight:600;padding:1px 8px;border-radius:10px">3</span></div>
    <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
  </div>
  <div style="background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:14px">
    <div style="display:flex;gap:6px;margin-bottom:10px"><span style="background:rgba(99,102,241,0.08);color:var(--kit-primary, #6366F1);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px">Design</span><span style="background:rgba(245,158,11,0.08);color:var(--kit-warning, #F59E0B);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px">Urgent</span></div>
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:10px">Redesign checkout flow</div>
    <div style="display:flex;align-items:center;justify-content:space-between"><div style="display:flex"><div style="width:24px;height:24px;border-radius:12px;background:#6366F1;border:2px solid var(--kit-bg, #FFFFFF);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">A</div><div style="width:24px;height:24px;border-radius:12px;background:#EC4899;border:2px solid var(--kit-bg, #FFFFFF);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;margin-left:-6px">B</div></div><span style="font-size:12px;color:var(--kit-text-3, #94A3B8)">Mar 28</span></div>
  </div>
  <div style="background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:14px">
    <div style="display:flex;gap:6px;margin-bottom:10px"><span style="background:rgba(34,197,94,0.08);color:var(--kit-success, #22C55E);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px">Dev</span></div>
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:10px">API integration for payments</div>
    <div style="display:flex;align-items:center;justify-content:space-between"><div style="width:24px;height:24px;border-radius:12px;background:#10B981;border:2px solid var(--kit-bg, #FFFFFF);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">C</div><span style="font-size:12px;color:var(--kit-text-3, #94A3B8)">Apr 2</span></div>
  </div>
  <div style="background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:14px">
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:10px">Update documentation</div>
    <div style="display:flex;align-items:center;justify-content:space-between"><div style="width:24px;height:24px;border-radius:12px;background:#F59E0B;border:2px solid var(--kit-bg, #FFFFFF);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600">D</div><span style="font-size:12px;color:var(--kit-text-3, #94A3B8)">Apr 5</span></div>
  </div>
</div>
