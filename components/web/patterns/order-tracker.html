<!--
  @name: Order Status Tracker
  @kit: web
  @width: 640
  @height: 80
  @tags: order, status, tracker, ecommerce, shipping, steps
-->
<div data-component="Order Status Tracker" style="width:100%;display:flex;align-items:center;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0"><div style="width:28px;height:28px;border-radius:14px;background:var(--kit-success, #22C55E);color:#fff;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span style="font-size:11px;font-weight:500;color:var(--kit-success, #22C55E)">Ordered</span></div>
  <div style="flex:1;height:2px;background:var(--kit-success, #22C55E);margin:0 8px 18px"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0"><div style="width:28px;height:28px;border-radius:14px;background:var(--kit-success, #22C55E);color:#fff;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span style="font-size:11px;font-weight:500;color:var(--kit-success, #22C55E)">Packed</span></div>
  <div style="flex:1;height:2px;background:var(--kit-primary, #6366F1);margin:0 8px 18px"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0"><div style="width:28px;height:28px;border-radius:14px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">3</div><span style="font-size:11px;font-weight:500;color:var(--kit-primary, #6366F1)">Shipped</span></div>
  <div style="flex:1;height:2px;background:var(--kit-border, #E2E8F0);margin:0 8px 18px"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0"><div style="width:28px;height:28px;border-radius:14px;border:2px solid var(--kit-border, #E2E8F0);color:var(--kit-text-3, #94A3B8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;box-sizing:border-box">4</div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Delivered</span></div>
</div>
