<!--
  @name: Resume Section
  @kit: web
  @width: 600
  @height: 200
  @tags: resume, cv, experience, job
-->
<div data-component="Resume Section" style="width:100%;max-width:600px;box-sizing:border-box;padding:20px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF)">
  <div style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--kit-text, #0F172A)">Experience</div>
  <div style="display:flex;gap:14px;margin-bottom:18px">
    <div style="width:40px;height:40px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden;flex-shrink:0">
      <img src="https://placehold.jp/40x40.png" alt="Figma" style="width:100%;height:100%;object-fit:cover;display:block"/>
    </div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Lead Designer at Figma</div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8);flex-shrink:0">2022 - Present</span>
      </div>
      <ul style="margin:6px 0 0 0;padding-left:16px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);line-height:1.6">
        <li>Led design system team of 8 designers serving 50+ product teams</li>
        <li>Shipped FigJam widgets used by 2M+ users monthly</li>
      </ul>
    </div>
  </div>
  <div style="display:flex;gap:14px">
    <div style="width:40px;height:40px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden;flex-shrink:0">
      <img src="https://placehold.jp/40x40.png" alt="Shopify" style="width:100%;height:100%;object-fit:cover;display:block"/>
    </div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Design System Lead at Shopify</div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8);flex-shrink:0">2019 - 2022</span>
      </div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <span style="padding:3px 8px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);border-radius:var(--kit-radius-sm, 4px)">Polaris</span>
        <span style="padding:3px 8px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);border-radius:var(--kit-radius-sm, 4px)">Design Tokens</span>
        <span style="padding:3px 8px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);border-radius:var(--kit-radius-sm, 4px)">React</span>
      </div>
    </div>
  </div>
</div>
