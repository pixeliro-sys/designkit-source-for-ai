<!--
  @name: Job Listing Card
  @kit: web
  @width: 600
  @height: 180
  @tags: job, listing, career, hiring
-->
<div data-component="Job Listing Card" style="width:100%;max-width:600px;box-sizing:border-box;padding:20px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;gap:14px">
    <div style="width:48px;height:48px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface-2, #F1F5F9);overflow:hidden;flex-shrink:0">
      <img src="https://placehold.jp/48x48.png" alt="Acme Corp" style="width:100%;height:100%;object-fit:cover;display:block"/>
    </div>
    <div style="flex:1;min-width:0">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Senior Product Designer</div>
          <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-top:2px">Acme Corp</div>
        </div>
        <div style="cursor:pointer;flex-shrink:0;padding:4px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:4px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">San Francisco, CA &bull; Remote</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">$120K - $160K</span>
        </div>
        <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">2 days ago</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">
        <div style="display:flex;gap:6px">
          <span style="padding:4px 10px;background:rgba(99,102,241,0.1);color:var(--kit-primary, #6366F1);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">Full-time</span>
          <span style="padding:4px 10px;background:rgba(34,197,94,0.1);color:var(--kit-success, #22C55E);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">Remote</span>
          <span style="padding:4px 10px;background:rgba(245,158,11,0.1);color:var(--kit-warning, #F59E0B);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">Senior</span>
        </div>
        <button style="padding:8px 20px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Apply Now</button>
      </div>
    </div>
  </div>
</div>
