<!--
  @name: Candidate Profile
  @kit: web
  @width: 400
  @height: 280
  @tags: candidate, profile, applicant, hiring
-->
<div data-component="Candidate Profile" style="width:100%;max-width:400px;box-sizing:border-box;padding:20px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
    <div style="width:64px;height:64px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;flex-shrink:0">
      <img src="https://placehold.jp/64x64.png" alt="Alex Johnson" style="width:100%;height:100%;object-fit:cover;display:block"/>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Alex Johnson</div>
      <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-top:2px">Product Designer</div>
    </div>
    <div style="text-align:center;flex-shrink:0">
      <div style="width:48px;height:48px;border-radius:var(--kit-radius-full, 9999px);background:rgba(34,197,94,0.1);display:flex;align-items:center;justify-content:center">
        <span style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-bold, 700);color:var(--kit-success, #22C55E)">92%</span>
      </div>
      <span style="font-size:10px;color:var(--kit-text-3, #94A3B8);margin-top:2px;display:block">Match</span>
    </div>
  </div>
  <div style="display:flex;gap:16px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:4px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">San Francisco</span>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">6 years exp.</span>
    </div>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">
    <span style="padding:4px 10px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">Figma</span>
    <span style="padding:4px 10px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">React</span>
    <span style="padding:4px 10px;background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-full, 9999px)">Design Systems</span>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Status:</span>
    <span style="padding:4px 12px;background:rgba(99,102,241,0.1);color:var(--kit-primary, #6366F1);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);border-radius:var(--kit-radius-full, 9999px)">Interview</span>
  </div>
  <div style="display:flex;gap:10px">
    <button style="flex:1;padding:10px 0;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">View Profile</button>
    <button style="flex:1;padding:10px 0;background:var(--kit-bg, #FFFFFF);color:var(--kit-primary, #6366F1);border:1px solid var(--kit-primary, #6366F1);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Schedule</button>
  </div>
</div>
