<!--
  @name: Salary Range
  @kit: web
  @width: 400
  @height: 50
  @tags: salary, range, compensation, job
-->
<div data-component="Salary Range" style="width:100%;max-width:400px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);padding:8px 0">
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8)">$80K</span>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-primary, #6366F1)">$120K - $140K</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8)">$160K</span>
  </div>
  <div style="position:relative;width:100%;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-full, 9999px)">
    <div style="position:absolute;left:50%;right:25%;height:100%;background:var(--kit-primary, #6366F1);border-radius:var(--kit-radius-full, 9999px)"></div>
    <div style="position:absolute;left:calc(50% - 7px);top:-4px;width:14px;height:14px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-bg, #FFFFFF);border:2px solid var(--kit-primary, #6366F1);box-sizing:border-box"></div>
    <div style="position:absolute;left:calc(75% - 7px);top:-4px;width:14px;height:14px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-bg, #FFFFFF);border:2px solid var(--kit-primary, #6366F1);box-sizing:border-box"></div>
  </div>
</div>
