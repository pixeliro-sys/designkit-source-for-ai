<!--
  @name: Product Reviews Section
  @kit: web
  @width: 640
  @height: 400
  @tags: reviews, rating, product, ecommerce, feedback

<div data-component="Product Reviews Section" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <div style="font-size:20px;font-weight:600;color:var(--kit-text, #0F172A)">Reviews (256)</div>
    <div style="height:36px;padding:0 16px;background:var(--kit-primary, #6366F1);color:#fff;border-radius:8px;display:flex;align-items:center;font-size:13px;font-weight:500;cursor:pointer">Write a Review</div>
  </div>
  <div style="display:flex;gap:32px;margin-bottom:24px;flex-wrap:wrap">
    <div style="text-align:center"><div style="font-size:48px;font-weight:700;color:var(--kit-text, #0F172A)">4.5</div><div style="display:flex;gap:2px;justify-content:center;margin:4px 0"><svg width="16" height="16" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="16" height="16" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="16" height="16" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="16" height="16" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-border, #E2E8F0)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div style="font-size:13px;color:var(--kit-text-3, #94A3B8)">256 reviews</div></div>
    <div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:20px;color:var(--kit-text-2, #475569)">5</span><div style="flex:1;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:3px"><div style="width:65%;height:100%;background:#FBBF24;border-radius:3px"></div></div><span style="width:30px;color:var(--kit-text-3, #94A3B8);text-align:right">65%</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:20px;color:var(--kit-text-2, #475569)">4</span><div style="flex:1;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:3px"><div style="width:22%;height:100%;background:#FBBF24;border-radius:3px"></div></div><span style="width:30px;color:var(--kit-text-3, #94A3B8);text-align:right">22%</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:20px;color:var(--kit-text-2, #475569)">3</span><div style="flex:1;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:3px"><div style="width:8%;height:100%;background:#FBBF24;border-radius:3px"></div></div><span style="width:30px;color:var(--kit-text-3, #94A3B8);text-align:right">8%</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:20px;color:var(--kit-text-2, #475569)">2</span><div style="flex:1;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:3px"><div style="width:3%;height:100%;background:#FBBF24;border-radius:3px"></div></div><span style="width:30px;color:var(--kit-text-3, #94A3B8);text-align:right">3%</span></div>
      <div style="display:flex;align-items:center;gap:8px;font-size:13px"><span style="width:20px;color:var(--kit-text-2, #475569)">1</span><div style="flex:1;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:3px"><div style="width:2%;height:100%;background:#FBBF24;border-radius:3px"></div></div><span style="width:30px;color:var(--kit-text-3, #94A3B8);text-align:right">2%</span></div>
    </div>
  </div>
  <div style="border-top:1px solid var(--kit-border, #E2E8F0);padding-top:20px">
    <div style="display:flex;gap:12px;margin-bottom:16px;align-items:flex-start">
      <div style="width:36px;height:36px;border-radius:18px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0">SC</div>
      <div style="flex:1"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:14px;font-weight:600;color:var(--kit-text, #0F172A)">Sarah Chen</span><span style="font-size:12px;color:var(--kit-text-3, #94A3B8)">Mar 20, 2026</span><span style="background:var(--kit-success-bg, #F0FDF4);color:var(--kit-success, #22C55E);font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px">Verified Purchase</span></div><div style="display:flex;gap:2px;margin-bottom:8px"><svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><svg width="14" height="14" viewBox="0 0 24 24" fill="#FBBF24" stroke="#FBBF24" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div style="font-size:14px;color:var(--kit-text, #0F172A);line-height:1.5">Amazing sound quality and the noise cancellation is incredible. Battery lasts forever. Best headphones I've ever owned.</div></div>
    </div>
  </div>
</div>
