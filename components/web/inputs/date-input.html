<!--
  @name: Date Input — with Calendar Icon
  @kit: web
  @width: 240
  @height: 68
  @tags: date, input, calendar, picker, form
-->
<div data-component="Date Input — with Calendar Icon" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:14px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:6px">Date</div>
  <div style="display:flex;align-items:center;width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;box-sizing:border-box;gap:8px;background:var(--kit-bg, #FFFFFF)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span style="flex:1;font-size:14px;color:var(--kit-text, #0F172A)">Mar 25, 2026</span>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>
