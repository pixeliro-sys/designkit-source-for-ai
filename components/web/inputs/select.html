<!--
  @name: Select Dropdown
  @kit: web
  @width: 360
  @height: 68
  @tags: select, dropdown, form, option
-->
<div data-component="Select Dropdown" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:6px">Category</div>
  <div style="display:flex;align-items:center;width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;box-sizing:border-box;cursor:pointer;background:var(--kit-bg, #FFFFFF)">
    <span style="flex:1;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">Select option...</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
</div>
