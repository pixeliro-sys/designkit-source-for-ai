<!--
  @name: Radio Group — Vertical
  @kit: web
  @width: 300
  @height: 140
  @tags: radio, group, options, form, select
-->
<div data-component="Radio Group — Vertical" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);margin-bottom:10px">Choose plan</div>
  <div style="display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;align-items:center;gap:10px;cursor:pointer"><div style="width:18px;height:18px;border-radius:9px;border:2px solid var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center;box-sizing:border-box;flex-shrink:0"><div style="width:8px;height:8px;border-radius:4px;background:var(--kit-primary, #6366F1)"></div></div><span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">Free — $0/mo</span></div>
    <div style="display:flex;align-items:center;gap:10px;cursor:pointer"><div style="width:18px;height:18px;border-radius:9px;border:2px solid var(--kit-border-strong, #CBD5E1);box-sizing:border-box;flex-shrink:0"></div><span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">Pro — $29/mo</span></div>
    <div style="display:flex;align-items:center;gap:10px;cursor:pointer"><div style="width:18px;height:18px;border-radius:9px;border:2px solid var(--kit-border-strong, #CBD5E1);box-sizing:border-box;flex-shrink:0"></div><span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A)">Enterprise — $99/mo</span></div>
  </div>
</div>
