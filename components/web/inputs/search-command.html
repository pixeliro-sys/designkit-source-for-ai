<!--
  @name: Search Input — with Shortcut
  @kit: web
  @width: 400
  @height: 40
  @tags: search, input, command, shortcut
-->
<div data-component="Search Input — with Shortcut" style="display:flex;align-items:center;width:100%;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);gap:8px;background:var(--kit-bg, #FFFFFF)">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <span style="flex:1;font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8)">Search...</span>
  <span style="font-size:11px;color:var(--kit-text-3, #94A3B8);background:var(--kit-surface, #F8FAFC);border:1px solid var(--kit-border, #E2E8F0);border-radius:4px;padding:2px 6px">⌘K</span>
</div>
