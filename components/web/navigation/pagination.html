<!--
  @name: Pagination
  @kit: web
  @width: 400
  @height: 40
  @tags: pagination, pages, navigation
-->
<nav data-component="Pagination" style="width:100%;box-sizing:border-box;display:flex;align-items:center;justify-content:center;gap:var(--kit-space-1, 4px);font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Previous -->
  <button style="display:flex;align-items:center;gap:var(--kit-space-1, 4px);padding:var(--kit-space-2, 8px) var(--kit-space-3, 12px);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Prev
  </button>

  <!-- Page 1 -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">1</button>

  <!-- Page 2 -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">2</button>

  <!-- Page 3 — Active -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-primary, #6366F1);border-radius:var(--kit-radius, 8px);background:var(--kit-primary, #6366F1);color:#FFFFFF;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);cursor:pointer;font-family:inherit;">3</button>

  <!-- Page 4 -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">4</button>

  <!-- Page 5 -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">5</button>

  <!-- Ellipsis -->
  <span style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--kit-text-3, #94A3B8);font-size:var(--kit-text-sm, 14px);letter-spacing:2px;">...</span>

  <!-- Page 24 -->
  <button style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">24</button>

  <!-- Next -->
  <button style="display:flex;align-items:center;gap:var(--kit-space-1, 4px);padding:var(--kit-space-2, 8px) var(--kit-space-3, 12px);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer;font-family:inherit;">
    Next
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>

</nav>
