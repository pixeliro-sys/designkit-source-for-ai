<!--
  @name: Sidebar — Expanded
  @kit: web
  @width: 240
  @height: 600
  @tags: sidebar, navigation, expanded, menu
-->
<div data-component="Sidebar — Expanded" style="width:100%;height:600px;box-sizing:border-box;display:flex;flex-direction:column;background:var(--kit-surface, #F8FAFC);border-right:1px solid var(--kit-border, #E2E8F0);padding:var(--kit-space-5, 20px) var(--kit-space-3, 12px);font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Logo + App Name -->
  <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:0 var(--kit-space-2, 8px);margin-bottom:var(--kit-space-6, 24px);flex-shrink:0;">
    <div style="width:32px;height:32px;border-radius:var(--kit-radius, 8px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
      </svg>
    </div>
    <span style="font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);">Workspace</span>
  </div>

  <!-- Section: Main -->
  <div style="margin-bottom:var(--kit-space-6, 24px);flex-shrink:0;">
    <div style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text-3, #94A3B8);text-transform:uppercase;letter-spacing:0.05em;padding:0 var(--kit-space-2, 8px);margin-bottom:var(--kit-space-2, 8px);">Main</div>

    <!-- Home — Active -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);background:var(--kit-primary, #6366F1);color:#FFFFFF;cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Home</span>
    </div>

    <!-- Inbox with badge -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/>
        <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);flex:1;">Inbox</span>
      <span style="min-width:20px;height:20px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-danger, #EF4444);color:#FFFFFF;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);display:flex;align-items:center;justify-content:center;padding:0 6px;">5</span>
    </div>

    <!-- Projects -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Projects</span>
    </div>

    <!-- Calendar -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Calendar</span>
    </div>

    <!-- Analytics -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10"/>
        <line x1="12" y1="20" x2="12" y2="4"/>
        <line x1="6" y1="20" x2="6" y2="14"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Analytics</span>
    </div>
  </div>

  <!-- Section: Settings -->
  <div style="flex:1;">
    <div style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text-3, #94A3B8);text-transform:uppercase;letter-spacing:0.05em;padding:0 var(--kit-space-2, 8px);margin-bottom:var(--kit-space-2, 8px);">Settings</div>

    <!-- Preferences -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Preferences</span>
    </div>

    <!-- Team -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;margin-bottom:2px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Team</span>
    </div>

    <!-- Help -->
    <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-radius:var(--kit-radius, 8px);color:var(--kit-text-2, #475569);cursor:pointer;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);">Help</span>
    </div>
  </div>

  <!-- User profile -->
  <div style="display:flex;align-items:center;gap:var(--kit-space-3, 12px);padding:var(--kit-space-2, 8px);border-top:1px solid var(--kit-border, #E2E8F0);padding-top:var(--kit-space-4, 16px);flex-shrink:0;">
    <div style="width:32px;height:32px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;flex-shrink:0;">
      <img src="https://placehold.jp/32x32" alt="Avatar" style="width:100%;height:100%;object-fit:cover;display:block;" />
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Sarah Chen</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">sarah@company.io</div>
    </div>
  </div>

</div>
