<!--
  @name: Skeleton — Card
  @kit: web
  @width: 320
  @height: 200
  @tags: skeleton, loading, placeholder, card
-->
<div data-component="Skeleton — Card" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);overflow:hidden;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <style>@keyframes skeletonPulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>
  <div style="width:100%;height:120px;background:var(--kit-surface-2, #F1F5F9);animation:skeletonPulse 1.5s ease-in-out infinite"></div>
  <div style="padding:var(--kit-space-4, 16px)">
    <div style="width:65%;height:14px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-sm, 4px);margin-bottom:var(--kit-space-3, 12px);animation:skeletonPulse 1.5s ease-in-out infinite"></div>
    <div style="width:90%;height:10px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-sm, 4px);margin-bottom:var(--kit-space-2, 8px);animation:skeletonPulse 1.5s ease-in-out infinite"></div>
    <div style="width:70%;height:10px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-sm, 4px);margin-bottom:var(--kit-space-4, 16px);animation:skeletonPulse 1.5s ease-in-out infinite"></div>
    <div style="width:40%;height:32px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius, 8px);animation:skeletonPulse 1.5s ease-in-out infinite"></div>
  </div>
</div>
