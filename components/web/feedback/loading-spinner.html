<!--
  @name: Loading Spinner — Centered
  @kit: web
  @width: 200
  @height: 200
  @tags: loading, spinner, progress, wait, feedback
-->
<div data-component="Loading Spinner — Centered" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="16" stroke="var(--kit-surface-2, #F1F5F9)" stroke-width="4"/>
    <circle cx="20" cy="20" r="16" stroke="var(--kit-primary, #6366F1)" stroke-width="4" stroke-dasharray="75 25" stroke-linecap="round" transform="rotate(-90 20 20)"/>
  </svg>
  <span style="font-size:14px;color:var(--kit-text-2, #475569)">Loading...</span>
</div>
