<!--
  @name: Progress Bar — with Label
  @kit: web
  @width: 400
  @height: 36
  @tags: progress, bar, loading, percentage
-->
<div data-component="Progress Bar — with Label" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:var(--kit-text-sm, 13px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Upload progress</span><span style="font-size:var(--kit-text-sm, 13px);color:var(--kit-text-2, #475569)">72%</span></div>
  <div style="width:100%;height:8px;background:var(--kit-surface-2, #F1F5F9);border-radius:4px;overflow:hidden"><div style="width:72%;height:100%;background:var(--kit-primary, #6366F1);border-radius:4px"></div></div>
</div>
