<!--
  @name: List View — Rows
  @kit: web
  @width: 640
  @height: 280
  @tags: list, view, rows, vertical, items
-->
<div data-component="List View — Rows" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);overflow:hidden;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;align-items:center;padding:14px 20px;gap:14px;border-bottom:1px solid var(--kit-border, #E2E8F0);cursor:pointer">
    <img src="https://placehold.jp/48x48.png" style="width:48px;height:48px;border-radius:var(--kit-radius, 8px);object-fit:cover;flex-shrink:0" alt="Item"/>
    <div style="flex:1;min-width:0"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Project Alpha</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Updated 2 hours ago · 12 files</div></div>
    <span style="background:var(--kit-success-bg, #F0FDF4);color:var(--kit-success, #22C55E);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;flex-shrink:0">Active</span>
    <div style="color:var(--kit-text-3, #94A3B8);flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div style="display:flex;align-items:center;padding:14px 20px;gap:14px;border-bottom:1px solid var(--kit-border, #E2E8F0);cursor:pointer">
    <img src="https://placehold.jp/48x48.png" style="width:48px;height:48px;border-radius:var(--kit-radius, 8px);object-fit:cover;flex-shrink:0" alt="Item"/>
    <div style="flex:1;min-width:0"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Dashboard Redesign</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Updated yesterday · 8 files</div></div>
    <span style="background:var(--kit-warning-bg, #FFFBEB);color:var(--kit-warning, #F59E0B);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;flex-shrink:0">In Review</span>
    <div style="color:var(--kit-text-3, #94A3B8);flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
  <div style="display:flex;align-items:center;padding:14px 20px;gap:14px;cursor:pointer">
    <img src="https://placehold.jp/48x48.png" style="width:48px;height:48px;border-radius:var(--kit-radius, 8px);object-fit:cover;flex-shrink:0" alt="Item"/>
    <div style="flex:1;min-width:0"><div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Mobile App v3</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Updated 3 days ago · 24 files</div></div>
    <span style="background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;flex-shrink:0">Draft</span>
    <div style="color:var(--kit-text-3, #94A3B8);flex-shrink:0"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></div>
  </div>
</div>
