<!--
  @name: Stat Card — Large
  @kit: web
  @width: 300
  @height: 160
  @tags: stat, metric, kpi, dashboard, card
-->
<div data-component="Stat Card — Large" style="width:100%;box-sizing:border-box;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:var(--kit-space-5, 20px);font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Header: Title + Trend -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--kit-space-3, 12px);">
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);">Revenue</span>
    <div style="display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:var(--kit-radius-full, 9999px);background:rgba(34,197,94,0.1);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-success, #22C55E);">+12.5%</span>
    </div>
  </div>

  <!-- Big Number -->
  <div style="font-size:var(--kit-text-3xl, 30px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);margin-bottom:var(--kit-space-3, 12px);line-height:1;">$48,352</div>

  <!-- Mini Sparkline -->
  <svg width="100%" height="32" viewBox="0 0 260 32" preserveAspectRatio="none" style="display:block;">
    <defs>
      <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--kit-primary, #6366F1)" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="var(--kit-primary, #6366F1)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M0,28 L20,24 L40,26 L60,20 L80,22 L100,16 L120,18 L140,10 L160,14 L180,8 L200,12 L220,6 L240,8 L260,4" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M0,28 L20,24 L40,26 L60,20 L80,22 L100,16 L120,18 L140,10 L160,14 L180,8 L200,12 L220,6 L240,8 L260,4 L260,32 L0,32 Z" fill="url(#sparkGrad)"/>
  </svg>

</div>
