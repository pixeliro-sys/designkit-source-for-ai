<!--
  @name: Tag Group
  @kit: web
  @width: 360
  @height: 36
  @tags: tag, chip, group, labels, filter
-->
<div data-component="Tag Group" style="width:100%;box-sizing:border-box;display:flex;align-items:center;gap:var(--kit-space-2, 8px);flex-wrap:wrap;font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Tag: Design -->
  <span style="display:inline-flex;align-items:center;padding:var(--kit-space-1, 4px) var(--kit-space-3, 12px);border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);white-space:nowrap;">Design</span>

  <!-- Tag: Frontend -->
  <span style="display:inline-flex;align-items:center;padding:var(--kit-space-1, 4px) var(--kit-space-3, 12px);border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);white-space:nowrap;">Frontend</span>

  <!-- Tag: React — Primary/Active -->
  <span style="display:inline-flex;align-items:center;padding:var(--kit-space-1, 4px) var(--kit-space-3, 12px);border-radius:var(--kit-radius-full, 9999px);background:var(--kit-primary, #6366F1);color:#FFFFFF;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);white-space:nowrap;">React</span>

  <!-- Tag: TypeScript -->
  <span style="display:inline-flex;align-items:center;padding:var(--kit-space-1, 4px) var(--kit-space-3, 12px);border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);white-space:nowrap;">TypeScript</span>

  <!-- Tag: UI/UX -->
  <span style="display:inline-flex;align-items:center;padding:var(--kit-space-1, 4px) var(--kit-space-3, 12px);border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface-2, #F1F5F9);color:var(--kit-text-2, #475569);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);white-space:nowrap;">UI/UX</span>

</div>
