<!--
  @name: Stat Card — Compact
  @kit: web
  @width: 200
  @height: 80
  @tags: stat, metric, kpi, compact
-->
<div data-component="Stat Card — Compact" style="width:100%;box-sizing:border-box;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:var(--kit-space-3, 12px) var(--kit-space-4, 16px);display:flex;align-items:center;gap:var(--kit-space-3, 12px);font-family:var(--kit-font, Inter, system-ui, sans-serif);">

  <!-- Icon Circle -->
  <div style="width:40px;height:40px;border-radius:var(--kit-radius-full, 9999px);background:rgba(99,102,241,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
  </div>

  <!-- Content -->
  <div style="flex:1;min-width:0;">
    <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569);margin-bottom:2px;">Users</div>
    <div style="display:flex;align-items:center;gap:var(--kit-space-2, 8px);">
      <span style="font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);line-height:1;">2,451</span>
      <div style="display:flex;align-items:center;gap:2px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
        <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-success, #22C55E);">8.2%</span>
      </div>
    </div>
  </div>

</div>
