<!--
  @name: Checkout Form — Shipping + Payment
  @kit: web
  @width: 640
  @height: 600
  @tags: checkout, form, shipping, payment, ecommerce
-->
<div data-component="Checkout Form — Shipping + Payment" style="width:100%;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;border-radius:14px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span style="font-size:13px;font-weight:500;color:var(--kit-primary, #6366F1)">Cart</span></div>
    <div style="flex:1;height:2px;background:var(--kit-primary, #6366F1)"></div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;border-radius:14px;background:var(--kit-primary, #6366F1);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600">2</div><span style="font-size:13px;font-weight:500;color:var(--kit-primary, #6366F1)">Shipping</span></div>
    <div style="flex:1;height:2px;background:var(--kit-border, #E2E8F0)"></div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:28px;height:28px;border-radius:14px;border:2px solid var(--kit-border, #E2E8F0);color:var(--kit-text-3, #94A3B8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;box-sizing:border-box">3</div><span style="font-size:13px;color:var(--kit-text-3, #94A3B8)">Payment</span></div>
  </div>
  <div style="font-size:20px;font-weight:600;color:var(--kit-text, #0F172A);margin-bottom:20px">Shipping Address</div>
  <div style="display:flex;gap:12px;margin-bottom:12px"><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">First Name</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text, #0F172A)">John</div></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">Last Name</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text, #0F172A)">Doe</div></div></div>
  <div style="margin-bottom:12px"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">Address</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text-3, #94A3B8)">123 Main Street</div></div>
  <div style="display:flex;gap:12px;margin-bottom:12px"><div style="flex:2"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">City</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text-3, #94A3B8)">San Francisco</div></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">State</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;font-size:14px;color:var(--kit-text, #0F172A)">CA<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div></div><div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">ZIP</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text-3, #94A3B8)">94102</div></div></div>
  <div style="margin-bottom:20px"><div style="font-size:13px;font-weight:500;color:var(--kit-text, #0F172A);margin-bottom:4px">Phone</div><div style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;padding:0 12px;display:flex;align-items:center;font-size:14px;color:var(--kit-text-3, #94A3B8)">+1 (555) 000-0000</div></div>
  <div style="font-size:20px;font-weight:600;color:var(--kit-text, #0F172A);margin-bottom:16px">Shipping Method</div>
  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:24px">
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid var(--kit-primary, #6366F1);border-radius:8px;cursor:pointer"><div style="width:18px;height:18px;border-radius:9px;border:2px solid var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center;box-sizing:border-box"><div style="width:8px;height:8px;border-radius:4px;background:var(--kit-primary, #6366F1)"></div></div><div style="flex:1"><div style="font-size:14px;font-weight:500;color:var(--kit-text, #0F172A)">Standard Shipping</div><div style="font-size:12px;color:var(--kit-text-3, #94A3B8)">5-7 business days</div></div><span style="font-size:14px;font-weight:600;color:var(--kit-success, #22C55E)">Free</span></div>
    <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;cursor:pointer"><div style="width:18px;height:18px;border-radius:9px;border:2px solid var(--kit-border-strong, #CBD5E1);box-sizing:border-box"></div><div style="flex:1"><div style="font-size:14px;font-weight:500;color:var(--kit-text, #0F172A)">Express Shipping</div><div style="font-size:12px;color:var(--kit-text-3, #94A3B8)">2-3 business days</div></div><span style="font-size:14px;font-weight:600;color:var(--kit-text, #0F172A)">$12.99</span></div>
  </div>
  <div style="display:flex;gap:12px"><div style="height:44px;flex:1;border:1px solid var(--kit-border, #E2E8F0);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--kit-text, #0F172A);cursor:pointer">Back to Cart</div><div style="height:44px;flex:1;background:var(--kit-primary, #6366F1);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer">Continue to Payment</div></div>
</div>
