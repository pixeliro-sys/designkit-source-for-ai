<!--
  @name: Stats Row
  @kit: web
  @width: 1200
  @height: 120
  @tags: stats, numbers, metrics, social proof
-->
<div data-component="Stats Row" style="width:100%;box-sizing:border-box;padding:32px 40px;background:var(--kit-bg,#FFFFFF);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;justify-content:center;gap:0;">
  <!-- Stat 1 -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 24px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary,#6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    <span style="font-size:var(--kit-text-3xl,30px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);letter-spacing:-0.02em;">10K+</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Active Users</span>
  </div>

  <!-- Divider -->
  <div style="width:1px;background:var(--kit-border,#E2E8F0);margin:8px 0;"></div>

  <!-- Stat 2 -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 24px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary,#6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span style="font-size:var(--kit-text-3xl,30px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);letter-spacing:-0.02em;">99.9%</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Uptime</span>
  </div>

  <!-- Divider -->
  <div style="width:1px;background:var(--kit-border,#E2E8F0);margin:8px 0;"></div>

  <!-- Stat 3 -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 24px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary,#6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    <span style="font-size:var(--kit-text-3xl,30px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);letter-spacing:-0.02em;">150+</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Countries</span>
  </div>

  <!-- Divider -->
  <div style="width:1px;background:var(--kit-border,#E2E8F0);margin:8px 0;"></div>

  <!-- Stat 4 -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 24px;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--kit-primary,#6366F1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span style="font-size:var(--kit-text-3xl,30px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);letter-spacing:-0.02em;">24/7</span>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text-2,#475569);">Support</span>
  </div>
</div>
