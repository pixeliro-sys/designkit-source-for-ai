<!--
  @name: Testimonial — Carousel
  @kit: web
  @width: 1200
  @height: 300
  @tags: testimonial, carousel, review, social proof
-->
<div data-component="Testimonial — Carousel" style="width:100%;box-sizing:border-box;padding:64px 40px;background:var(--kit-bg,#FFFFFF);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:column;align-items:center;position:relative;">
  <!-- Quote -->
  <div style="max-width:720px;text-align:center;margin-bottom:32px;">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="var(--kit-primary,#6366F1)" stroke="none" style="margin-bottom:16px;opacity:0.2;"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
    <p style="margin:0;font-size:var(--kit-text-xl,20px);font-weight:var(--kit-font-normal,400);color:var(--kit-text,#0F172A);line-height:1.6;font-style:italic;">"This platform completely transformed how our team collaborates. We shipped our product 3x faster and the quality improved dramatically. I can't imagine going back."</p>
  </div>

  <!-- Avatar + Info -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px;">
    <img src="https://placehold.jp/48x48" alt="Sarah Chen" style="width:48px;height:48px;border-radius:50%;" />
    <div>
      <div style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Sarah Chen</div>
      <div style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">VP of Engineering, TechFlow</div>
    </div>
  </div>

  <!-- Navigation -->
  <div style="display:flex;align-items:center;gap:24px;">
    <!-- Left Arrow -->
    <button style="width:40px;height:40px;border-radius:50%;border:1px solid var(--kit-border,#E2E8F0);background:var(--kit-bg,#FFFFFF);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--kit-text-2,#475569);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <!-- Dots -->
    <div style="display:flex;gap:8px;">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--kit-border,#E2E8F0);"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--kit-border,#E2E8F0);"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--kit-primary,#6366F1);"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--kit-border,#E2E8F0);"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:var(--kit-border,#E2E8F0);"></div>
    </div>

    <!-- Right Arrow -->
    <button style="width:40px;height:40px;border-radius:50%;border:1px solid var(--kit-border,#E2E8F0);background:var(--kit-bg,#FFFFFF);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--kit-text-2,#475569);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>
