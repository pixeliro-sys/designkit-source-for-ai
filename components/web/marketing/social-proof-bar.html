<!--
  @name: Social Proof Bar
  @kit: web
  @width: 1200
  @height: 60
  @tags: social proof, trust, banner
-->
<div data-component="Social Proof Bar" style="width:100%;box-sizing:border-box;padding:16px 40px;background:var(--kit-surface,#F8FAFC);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;align-items:center;justify-content:center;gap:24px;border-top:1px solid var(--kit-border,#E2E8F0);border-bottom:1px solid var(--kit-border,#E2E8F0);">
  <!-- Text -->
  <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">Join 50,000+ designers who trust Pixeliro</span>

  <!-- Overlapping Avatars -->
  <div style="display:flex;align-items:center;">
    <img src="https://placehold.jp/28x28" alt="User" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);" />
    <img src="https://placehold.jp/28x28" alt="User" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" />
    <img src="https://placehold.jp/28x28" alt="User" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" />
    <img src="https://placehold.jp/28x28" alt="User" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" />
    <img src="https://placehold.jp/28x28" alt="User" style="width:28px;height:28px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" />
  </div>

  <!-- Stars -->
  <div style="display:flex;align-items:center;gap:4px;">
    <div style="display:flex;gap:1px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-accent,#EC4899)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-accent,#EC4899)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-accent,#EC4899)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-accent,#EC4899)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-accent,#EC4899)" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </div>
    <span style="font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">4.9/5 rating</span>
  </div>
</div>
