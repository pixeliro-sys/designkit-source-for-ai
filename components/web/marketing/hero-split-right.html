<!--
  @name: Hero — Split (Image Right)
  @kit: web
  @width: 1200
  @height: 500
  @tags: hero, split, image, landing
-->
<div data-component="Hero — Split (Image Right)" style="width:100%;box-sizing:border-box;padding:64px 40px;background:var(--kit-bg,#FFFFFF);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;align-items:center;gap:60px;">
  <!-- Left Content -->
  <div style="flex:1;display:flex;flex-direction:column;">
    <h1 style="margin:0 0 16px 0;font-size:var(--kit-text-3xl,30px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);line-height:1.2;letter-spacing:-0.02em;">Ship your next big idea in record time</h1>
    <p style="margin:0 0 28px 0;font-size:var(--kit-text-lg,18px);font-weight:var(--kit-font-normal,400);color:var(--kit-text-2,#475569);line-height:1.6;">The all-in-one platform for teams who want to move fast. Design, build, and launch products without the hassle.</p>

    <!-- Email Input + CTA -->
    <div style="display:flex;gap:8px;margin-bottom:24px;">
      <input type="email" placeholder="Enter your email" style="flex:1;padding:12px 16px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-md,16px);font-family:var(--kit-font,Inter,system-ui,sans-serif);color:var(--kit-text,#0F172A);background:var(--kit-bg,#FFFFFF);outline:none;" />
      <button style="padding:12px 24px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;white-space:nowrap;">Get Started Free</button>
    </div>

    <!-- Social Proof -->
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:flex;">
        <img src="https://placehold.jp/32x32" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);" alt="User" />
        <img src="https://placehold.jp/32x32" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" alt="User" />
        <img src="https://placehold.jp/32x32" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--kit-bg,#FFFFFF);margin-left:-8px;" alt="User" />
      </div>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Join <strong style="color:var(--kit-text,#0F172A);">2,500+</strong> happy customers</span>
    </div>
  </div>

  <!-- Right Image -->
  <div style="flex:1;display:flex;justify-content:center;">
    <img src="https://placehold.jp/540x400" alt="Product Screenshot" style="width:100%;max-width:540px;height:auto;border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);box-shadow:0 20px 60px rgba(0,0,0,0.08);" />
  </div>
</div>
