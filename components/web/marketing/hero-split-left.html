<div data-component="Hero — Split (Image Left)" style="width:100%;box-sizing:border-box;padding:64px 40px;background:var(--kit-bg,#FFFFFF);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;align-items:center;gap:60px;">

    <div style="display:flex;gap:12px;margin-bottom:32px;">

    </div>

    <!-- Stats Row -->
    <div style="display:flex;gap:32px;">
      <div style="display:flex;flex-direction:column;">
        <span style="font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-primary,#6366F1);">99.9%</span>

      </div>
      <div style="display:flex;flex-direction:column;">
        <span style="font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-primary,#6366F1);">50M+</span>
        <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Events Tracked</span>
      </div>
      <div style="display:flex;flex-direction:column;">
        <span style="font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-primary,#6366F1);">4.9/5</span>
        <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">User Rating</span>
      </div>
    </div>

</div>
