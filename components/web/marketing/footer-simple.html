<!--
  @name: Footer — Simple
  @kit: web
  @width: 1200
  @height: 180
  @tags: footer, links, copyright, navigation
-->
<div data-component="Footer — Simple" style="width:100%;box-sizing:border-box;padding:48px 40px 32px;background:var(--kit-bg,#FFFFFF);font-family:var(--kit-font,Inter,system-ui,sans-serif);border-top:1px solid var(--kit-border,#E2E8F0);">
  <!-- Top Row -->
  <div style="display:flex;justify-content:space-between;margin-bottom:32px;">

    <div style="display:flex;flex-direction:column;gap:8px;">
      <span style="font-size:var(--kit-text-lg,18px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">Pixeliro</span>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Design, build, and ship faster.</span>
    </div>

    <!-- Link Columns -->
    <div style="display:flex;gap:64px;">
      <!-- Product -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);text-transform:uppercase;letter-spacing:0.05em;">Product</span>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Features</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Pricing</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Changelog</a>
      </div>
      <!-- Company -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);text-transform:uppercase;letter-spacing:0.05em;">Company</span>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">About</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Blog</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Careers</a>
      </div>
      <!-- Legal -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        <span style="font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);text-transform:uppercase;letter-spacing:0.05em;">Legal</span>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Privacy</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Terms</a>
        <a href="#" style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);text-decoration:none;">Cookie Policy</a>
      </div>
    </div>
  </div>

  <!-- Bottom Row -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding-top:20px;border-top:1px solid var(--kit-border,#E2E8F0);">
    <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-3,#94A3B8);">2026 Pixeliro. All rights reserved.</span>
    <!-- Social Icons -->
    <div style="display:flex;gap:16px;">
      <a href="#" style="color:var(--kit-text-3,#94A3B8);text-decoration:none;">
