<!--
  @name: Newsletter Signup
  @kit: web
  @width: 600
  @height: 140
  @tags: newsletter, email, signup, subscribe
-->
<div data-component="Newsletter Signup" style="width:100%;box-sizing:border-box;padding:32px;background:var(--kit-surface,#F8FAFC);font-family:var(--kit-font,Inter,system-ui,sans-serif);border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);">
  <!-- Top Row: Icon + Text -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <div style="width:40px;height:40px;border-radius:var(--kit-radius,8px);background:var(--kit-primary,#6366F1);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    </div>
    <div>
      <h3 style="margin:0 0 2px 0;font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);">Subscribe to our newsletter</h3>
      <p style="margin:0;font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);">Get weekly tips, tutorials, and product updates.</p>
    </div>
  </div>

  <!-- Input + Button Row -->
  <div style="display:flex;gap:8px;">
    <input type="email" placeholder="you@example.com" style="flex:1;padding:10px 14px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-family:var(--kit-font,Inter,system-ui,sans-serif);color:var(--kit-text,#0F172A);background:var(--kit-bg,#FFFFFF);outline:none;" />
    <button style="padding:10px 20px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;white-space:nowrap;">Subscribe</button>
  </div>
</div>
