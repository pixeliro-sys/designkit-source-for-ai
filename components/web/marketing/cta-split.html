<!--
  @name: CTA — Split
  @kit: web
  @width: 1200
  @height: 200
  @tags: cta, newsletter, email, marketing
-->
<div data-component="CTA — Split" style="width:100%;box-sizing:border-box;padding:48px 40px;background:var(--kit-surface,#F8FAFC);font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;align-items:center;justify-content:space-between;gap:48px;border-radius:var(--kit-radius-lg,16px);border:1px solid var(--kit-border,#E2E8F0);">
  <!-- Left: Text -->
  <div style="flex:1;">
    <h2 style="margin:0 0 8px 0;font-size:var(--kit-text-2xl,24px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);letter-spacing:-0.02em;">Stay in the loop</h2>
    <p style="margin:0;font-size:var(--kit-text-md,16px);color:var(--kit-text-2,#475569);line-height:1.5;">Get the latest product updates, tips, and insights delivered straight to your inbox. No spam, unsubscribe anytime.</p>
  </div>

  <!-- Right: Email Input -->
  <div style="display:flex;gap:8px;flex-shrink:0;">
    <input type="email" placeholder="Enter your email address" style="width:280px;padding:12px 16px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-family:var(--kit-font,Inter,system-ui,sans-serif);color:var(--kit-text,#0F172A);background:var(--kit-bg,#FFFFFF);outline:none;" />
    <button style="padding:12px 24px;background:var(--kit-primary,#6366F1);color:var(--kit-primary-fg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;white-space:nowrap;">Subscribe</button>
  </div>
</div>
