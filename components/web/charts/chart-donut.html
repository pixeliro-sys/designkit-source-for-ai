<!--
  @name: Donut Chart — with Legend
  @kit: web
  @width: 320
  @height: 300
  @tags: chart, donut, pie, data, visualization, legend
-->
<div data-component="Donut Chart — with Legend" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:24px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:20px">Traffic Sources</div>
  <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
    <div style="width:160px;height:160px;position:relative;flex-shrink:0">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="56" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="20" stroke-dasharray="123 229" stroke-dashoffset="-57" stroke-linecap="round"/>
        <circle cx="80" cy="80" r="56" fill="none" stroke="#F472B6" stroke-width="20" stroke-dasharray="88 264" stroke-dashoffset="-180" stroke-linecap="round"/>
        <circle cx="80" cy="80" r="56" fill="none" stroke="#34D399" stroke-width="20" stroke-dasharray="70 282" stroke-dashoffset="-268" stroke-linecap="round"/>
        <circle cx="80" cy="80" r="56" fill="none" stroke="#FBBF24" stroke-width="20" stroke-dasharray="35 317" stroke-dashoffset="-338" stroke-linecap="round"/>
      </svg>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center"><div style="font-size:24px;font-weight:700;color:var(--kit-text, #0F172A)">8.4K</div><div style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Total</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;flex:1;min-width:100px">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:3px;background:var(--kit-primary, #6366F1)"></div><div style="flex:1;font-size:13px;color:var(--kit-text, #0F172A)">Direct</div><div style="font-size:13px;font-weight:600;color:var(--kit-text, #0F172A)">35%</div></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:3px;background:#F472B6"></div><div style="flex:1;font-size:13px;color:var(--kit-text, #0F172A)">Social</div><div style="font-size:13px;font-weight:600;color:var(--kit-text, #0F172A)">25%</div></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:3px;background:#34D399"></div><div style="flex:1;font-size:13px;color:var(--kit-text, #0F172A)">Organic</div><div style="font-size:13px;font-weight:600;color:var(--kit-text, #0F172A)">20%</div></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:3px;background:#FBBF24"></div><div style="flex:1;font-size:13px;color:var(--kit-text, #0F172A)">Referral</div><div style="font-size:13px;font-weight:600;color:var(--kit-text, #0F172A)">10%</div></div>
    </div>
  </div>
</div>
