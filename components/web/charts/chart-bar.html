<!--
  @name: Bar Chart — Vertical
  @kit: web
  @width: 560
  @height: 280
  @tags: chart, bar, vertical, data, visualization
-->
<div data-component="Bar Chart — Vertical" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:24px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:20px">Weekly Activity</div>
  <div style="display:flex;align-items:flex-end;justify-content:space-between;height:160px;padding:0 8px;gap:16px">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:55%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0;opacity:0.7"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Mon</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:80%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0;opacity:0.85"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Tue</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:45%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0;opacity:0.6"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Wed</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:95%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Thu</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:100%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Fri</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:70%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0;opacity:0.75"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Sat</span></div>
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:100%;height:30%;background:var(--kit-primary, #6366F1);border-radius:6px 6px 0 0;opacity:0.5"></div><span style="font-size:11px;color:var(--kit-text-3, #94A3B8)">Sun</span></div>
  </div>
</div>
