<!--
  @name: Area Chart — with Gradient
  @kit: web
  @width: 560
  @height: 280
  @tags: chart, area, line, trend, data, visualization
-->
<div data-component="Area Chart — with Gradient" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:24px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div><div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Revenue</div><div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-top:2px">Last 6 months</div></div>
    <div style="display:flex;align-items:center;gap:4px;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-success, #22C55E)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>+24.5%</div>
  </div>
  <svg width="100%" height="180" viewBox="0 0 512 180" preserveAspectRatio="none" style="display:block">
    <defs><linearGradient id="webAreaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" style="stop-color:var(--kit-primary, #6366F1);stop-opacity:0.2"/><stop offset="100%" style="stop-color:var(--kit-primary, #6366F1);stop-opacity:0.01"/></linearGradient></defs>
    <line x1="0" y1="36" x2="512" y2="36" stroke="var(--kit-border, #E2E8F0)" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="72" x2="512" y2="72" stroke="var(--kit-border, #E2E8F0)" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="108" x2="512" y2="108" stroke="var(--kit-border, #E2E8F0)" stroke-width="0.5" stroke-dasharray="4"/>
    <line x1="0" y1="144" x2="512" y2="144" stroke="var(--kit-border, #E2E8F0)" stroke-width="0.5" stroke-dasharray="4"/>
    <path d="M0,130 L85,110 L170,70 L256,90 L341,40 L426,55 L512,20 L512,180 L0,180 Z" fill="url(#webAreaGrad)"/>
    <polyline points="0,130 85,110 170,70 256,90 341,40 426,55 512,20" fill="none" stroke="var(--kit-primary, #6366F1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="341" cy="40" r="4" fill="var(--kit-primary, #6366F1)"/>
    <circle cx="341" cy="40" r="8" fill="var(--kit-primary, #6366F1)" opacity="0.15"/>
  </svg>
  <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--kit-text-3, #94A3B8)"><span>Oct</span><span>Nov</span><span>Dec</span><span>Jan</span><span>Feb</span><span>Mar</span></div>
</div>
