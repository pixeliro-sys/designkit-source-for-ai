<div data-component="Hero — Full Image Background" style="width:100%;height:560px;position:relative;font-family:var(--kit-font, Inter, system-ui, sans-serif);overflow:hidden">
  <img src="https://placehold.jp/1440x560.png" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="Hero background"/>
  <div style="position:absolute;inset:0;background:linear-gradient(to right, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%)"></div>
  <div style="position:relative;z-index:1;display:flex;align-items:center;height:100%;padding:0 64px">
    <div style="max-width:600px">
      <div style="font-size:52px;font-weight:800;color:#FFFFFF;line-height:1.1;margin-bottom:20px">Create Without Limits</div>
      <div style="font-size:18px;color:rgba(255,255,255,0.8);line-height:1.6;margin-bottom:32px">Professional design tools that empower creators to bring their vision to life.</div>
      <div style="display:flex;gap:12px">
        <div style="height:48px;padding:0 28px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border-radius:8px;display:flex;align-items:center;font-size:16px;font-weight:600;cursor:pointer">Start Creating</div>
        <div style="height:48px;padding:0 28px;border:1px solid rgba(255,255,255,0.4);color:#FFFFFF;border-radius:8px;display:flex;align-items:center;font-size:16px;cursor:pointer">Learn More</div>
      </div>
    </div>
  </div>
</div>
