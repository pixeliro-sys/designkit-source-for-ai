<!--
  @name: Audit Log Row
  @kit: web
  @width: 700
  @height: 48
  @tags: audit, log, activity, admin, saas
-->
<div data-component="Audit Log Row" style="width:100%;max-width:700px;box-sizing:border-box;padding:10px 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-bottom:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;gap:12px">
  <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);white-space:nowrap;width:100px;flex-shrink:0">Mar 25, 14:32</span>
  <div style="display:flex;align-items:center;gap:6px;width:140px;flex-shrink:0">
    <div style="width:24px;height:24px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;flex-shrink:0"><img src="https://placehold.jp/24x24.png" alt="Sarah Chen" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
    <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Sarah Chen</span>
  </div>
  <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Updated billing plan</span>
  <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);font-family:monospace;width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Subscription #1234</span>
  <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);font-family:monospace;width:90px;flex-shrink:0">192.168.1.1</span>
  <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
    <span style="width:8px;height:8px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-info, #3B82F6)"></span>
    <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-info, #3B82F6);font-weight:var(--kit-font-medium, 500)">Info</span>
  </div>
</div>
