<!--
  @name: Webhook Config
  @kit: web
  @width: 700
  @height: 200
  @tags: webhook, config, api, developer, saas
-->
<div data-component="Webhook Config" style="width:100%;max-width:700px;box-sizing:border-box;padding:20px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="margin-bottom:14px">
    <div style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);margin-bottom:6px">Webhook Endpoint</div>
    <div style="display:flex;gap:8px">
      <div style="flex:1;padding:10px 14px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-family:monospace;background:var(--kit-surface, #F8FAFC)">https://api.example.com/webhooks</div>
    </div>
  </div>
  <div style="margin-bottom:14px">
    <div style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);margin-bottom:8px">Events</div>
    <div style="display:flex;flex-wrap:wrap;gap:12px">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <div style="width:18px;height:18px;border-radius:var(--kit-radius-sm, 4px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-family:monospace">user.created</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <div style="width:18px;height:18px;border-radius:var(--kit-radius-sm, 4px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-family:monospace">order.completed</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <div style="width:18px;height:18px;border-radius:var(--kit-radius-sm, 4px);background:var(--kit-primary, #6366F1);display:flex;align-items:center;justify-content:center"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-family:monospace">payment.succeeded</span>
      </label>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
        <div style="width:18px;height:18px;border-radius:var(--kit-radius-sm, 4px);border:2px solid var(--kit-border, #E2E8F0);box-sizing:border-box"></div>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);font-family:monospace">subscription.cancelled</span>
      </label>
    </div>
  </div>
  <div style="margin-bottom:16px">
    <div style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text-2, #475569);margin-bottom:6px">Signing Secret</div>
    <div style="padding:10px 14px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8);font-family:monospace;background:var(--kit-surface, #F8FAFC)">whsec_****************************</div>
  </div>
  <div style="display:flex;gap:10px">
    <button style="padding:10px 24px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Save Changes</button>
    <button style="padding:10px 24px;background:var(--kit-bg, #FFFFFF);color:var(--kit-text-2, #475569);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Send Test Event</button>
  </div>
</div>
