<!--
  @name: API Key Row
  @kit: web
  @width: 700
  @height: 64
  @tags: api, key, token, developer, saas
-->
<div data-component="API Key Row" style="width:100%;max-width:700px;box-sizing:border-box;padding:14px 16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius, 8px);border:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;gap:12px">
  <div style="width:36px;height:36px;border-radius:var(--kit-radius, 8px);background:var(--kit-surface, #F8FAFC);display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
  </div>
  <div style="flex:1;min-width:0">
    <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Production Key</div>
    <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);font-family:monospace;margin-top:2px">sk_live_****************************7x2F</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <div style="text-align:right;margin-right:8px">
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">Created Mar 15</div>
      <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">Last used 2h ago</div>
    </div>
    <div style="width:32px;height:32px;border-radius:var(--kit-radius, 8px);border:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;justify-content:center;cursor:pointer" title="Copy">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    </div>
    <div style="width:32px;height:32px;border-radius:var(--kit-radius, 8px);border:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;justify-content:center;cursor:pointer" title="Regenerate">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </div>
    <div style="width:32px;height:32px;border-radius:var(--kit-radius, 8px);border:1px solid var(--kit-border, #E2E8F0);display:flex;align-items:center;justify-content:center;cursor:pointer" title="Delete">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--kit-danger, #EF4444)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </div>
  </div>
</div>
