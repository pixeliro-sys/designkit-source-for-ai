<!--
  @name: Billing Plan Card
  @kit: web
  @width: 360
  @height: 380
  @tags: billing, plan, subscription, saas
-->
<div data-component="Billing Plan Card" style="width:100%;max-width:360px;box-sizing:border-box;padding:24px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-primary, #6366F1);text-transform:uppercase;letter-spacing:0.5px">Current Plan</span>
    <span style="padding:3px 10px;background:rgba(99,102,241,0.1);color:var(--kit-primary, #6366F1);font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);border-radius:var(--kit-radius-full, 9999px)">Active</span>
  </div>
  <div style="font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">Professional</div>
  <div style="margin-top:4px;margin-bottom:16px">
    <span style="font-size:var(--kit-text-3xl, 30px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$29</span>
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-3, #94A3B8)">/month</span>
  </div>
  <div style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8);margin-bottom:16px">Next billing: Apr 1, 2026</div>
  <div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">API Calls</span>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">8,500 / 10,000</span>
    </div>
    <div style="width:100%;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-full, 9999px);overflow:hidden">
      <div style="width:85%;height:100%;background:var(--kit-warning, #F59E0B);border-radius:var(--kit-radius-full, 9999px)"></div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">10,000 API calls/month</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">5 team members</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Priority support</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-success, #22C55E)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Advanced analytics</span>
    </div>
  </div>
  <button style="width:100%;padding:10px 0;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer;margin-bottom:10px">Upgrade Plan</button>
  <div style="text-align:center">
    <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-danger, #EF4444);cursor:pointer">Cancel Subscription</span>
  </div>
</div>
