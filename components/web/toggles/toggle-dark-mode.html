<div data-component="Toggle — Dark Mode" style="display:inline-flex;align-items:center;height:44px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-surface, #F8FAFC);border:1px solid var(--kit-border, #E2E8F0);padding:4px;box-sizing:border-box;gap:0;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <!-- Light (active) -->
  <div style="display:flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-primary, #6366F1);cursor:pointer">

  <div style="display:flex;align-items:center;gap:6px;height:36px;padding:0 16px;border-radius:var(--kit-radius-full, 9999px);cursor:pointer">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

  </div>
</div>
