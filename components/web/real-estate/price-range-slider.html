<!--
  @name: Price Range Slider
  @kit: web
  @width: 320
  @height: 64
  @tags: price, range, filter, real estate
-->
<div data-component="Price Range Slider" style="width:100%;max-width:320px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);padding:8px 0">
  <div style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A);margin-bottom:10px">Price Range</div>
  <div style="display:flex;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">$200K</span>
    <span style="font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-primary, #6366F1)">$350K - $550K</span>
    <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">$800K</span>
  </div>
  <div style="position:relative;width:100%;height:6px;background:var(--kit-surface-2, #F1F5F9);border-radius:var(--kit-radius-full, 9999px)">
    <div style="position:absolute;left:25%;right:42%;height:100%;background:var(--kit-primary, #6366F1);border-radius:var(--kit-radius-full, 9999px)"></div>
    <div style="position:absolute;left:calc(25% - 7px);top:-4px;width:14px;height:14px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-bg, #FFFFFF);border:2px solid var(--kit-primary, #6366F1);box-sizing:border-box;cursor:pointer"></div>
    <div style="position:absolute;left:calc(58% - 7px);top:-4px;width:14px;height:14px;border-radius:var(--kit-radius-full, 9999px);background:var(--kit-bg, #FFFFFF);border:2px solid var(--kit-primary, #6366F1);box-sizing:border-box;cursor:pointer"></div>
  </div>
</div>
