<!--
  @name: Listing Detail Hero
  @kit: web
  @width: 800
  @height: 400
  @tags: listing, detail, property, real estate
-->
<div data-component="Listing Detail Hero" style="width:100%;max-width:800px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF)">
  <div style="position:relative;width:100%;height:250px;border-radius:var(--kit-radius-md, 12px);overflow:hidden;margin-bottom:10px">
    <img src="https://placehold.jp/800x250.png" alt="Property" style="width:100%;height:100%;object-fit:cover;display:block"/>
    <span style="position:absolute;bottom:10px;right:10px;padding:6px 12px;background:rgba(15,23,42,0.7);color:#FFFFFF;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius, 8px);backdrop-filter:blur(4px)">1 / 12</span>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:16px">
    <div style="flex:1;height:60px;border-radius:var(--kit-radius, 8px);overflow:hidden"><img src="https://placehold.jp/190x60.png" alt="Photo 2" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
    <div style="flex:1;height:60px;border-radius:var(--kit-radius, 8px);overflow:hidden"><img src="https://placehold.jp/190x60.png" alt="Photo 3" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
    <div style="flex:1;height:60px;border-radius:var(--kit-radius, 8px);overflow:hidden"><img src="https://placehold.jp/190x60.png" alt="Photo 4" style="width:100%;height:100%;object-fit:cover;display:block"/></div>
    <div style="flex:1;height:60px;border-radius:var(--kit-radius, 8px);overflow:hidden;position:relative"><img src="https://placehold.jp/190x60.png" alt="Photo 5" style="width:100%;height:100%;object-fit:cover;display:block"/><div style="position:absolute;inset:0;background:rgba(15,23,42,0.5);display:flex;align-items:center;justify-content:center;color:#FFFFFF;font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600)">+8</div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:var(--kit-text-3xl, 30px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$485,000</div>
      <div style="font-size:var(--kit-text-md, 16px);color:var(--kit-text-2, #475569);margin-top:4px">123 Oak Street, Austin TX 78701</div>
    </div>
    <button style="padding:10px 24px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer;white-space:nowrap">Contact Agent</button>
  </div>
  <div style="display:flex;gap:20px;margin-top:14px;padding-top:14px;border-top:1px solid var(--kit-border, #E2E8F0)">
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7"/><path d="M21 7H3l2-4h14l2 4z"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">3 Beds</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16a1 1 0 0 1 1 1v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3a1 1 0 0 1 1-1z"/><path d="M6 12V5a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v7"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">2 Baths</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">1,850 sqft</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Built 2018</span>
    </div>
  </div>
</div>
