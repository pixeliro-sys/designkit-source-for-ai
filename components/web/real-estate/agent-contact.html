<div data-component="Agent Contact Card" style="width:100%;max-width:360px;box-sizing:border-box;padding:16px;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);border:1px solid var(--kit-border, #E2E8F0)">
  <div style="display:flex;gap:14px;margin-bottom:14px">
    <div style="width:56px;height:56px;border-radius:var(--kit-radius-full, 9999px);overflow:hidden;flex-shrink:0">
      <img src="https://placehold.jp/56x56.png" alt="Jennifer Martinez" style="width:100%;height:100%;object-fit:cover;display:block"/>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-size:var(--kit-text-md, 16px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Jennifer Martinez</div>
      <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-top:2px">Licensed Realtor &bull; Keller Williams</div>
      <div style="display:flex;gap:12px;margin-top:6px">
        <div style="display:flex;align-items:center;gap:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">(512) 555-0147</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-2, #475569)">jennifer@kw.com</span>
        </div>
      </div>
    </div>
  </div>
  <div style="display:flex;gap:10px">
    <button style="flex:1;padding:10px 0;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Contact Agent</button>
    <button style="flex:1;padding:10px 0;background:var(--kit-bg, #FFFFFF);color:var(--kit-primary, #6366F1);border:1px solid var(--kit-primary, #6366F1);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">Schedule Tour</button>
  </div>
</div>
