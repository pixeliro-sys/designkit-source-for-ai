<!--
  @name: Property Card
  @kit: web
  @width: 360
  @height: 340
  @tags: property, listing, house, real estate
-->
<div data-component="Property Card" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif);background:var(--kit-bg, #FFFFFF);border-radius:var(--kit-radius-md, 12px);overflow:hidden;border:1px solid var(--kit-border, #E2E8F0)">
  <div style="position:relative;width:100%;height:180px;overflow:hidden">
    <img src="https://placehold.jp/360x180.png" alt="123 Oak Street" style="width:100%;height:100%;object-fit:cover;display:block"/>
    <div style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:var(--kit-radius-full, 9999px);background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-2, #475569)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <span style="position:absolute;bottom:10px;left:10px;padding:4px 10px;background:rgba(15,23,42,0.7);color:#FFFFFF;font-size:var(--kit-text-xs, 12px);font-weight:var(--kit-font-medium, 500);border-radius:var(--kit-radius-sm, 4px);backdrop-filter:blur(4px)">Single Family</span>
  </div>
  <div style="padding:14px 16px">
    <div style="font-size:var(--kit-text-xl, 20px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A)">$485,000</div>
    <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-top:4px">123 Oak Street, Austin TX</div>
    <div style="display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--kit-border, #E2E8F0)">
      <div style="display:flex;align-items:center;gap:5px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v11a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V7"/><path d="M21 7H3l2-4h14l2 4z"/><path d="M7 11v4"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">3 bed</span>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16a1 1 0 0 1 1 1v3a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4v-3a1 1 0 0 1 1-1z"/><path d="M6 12V5a2 2 0 0 1 2-2h3a2 2 0 0 1 2 2v7"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">2 bath</span>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--kit-text-3, #94A3B8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
        <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">1,850 sqft</span>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-size:var(--kit-text-xs, 12px);color:var(--kit-text-3, #94A3B8)">Listed 2 days ago</span>
      <button style="padding:8px 18px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);font-family:var(--kit-font, Inter, system-ui, sans-serif);cursor:pointer">View Details</button>
    </div>
  </div>
</div>
