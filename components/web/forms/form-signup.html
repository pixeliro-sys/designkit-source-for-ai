<!--
  @name: Form — Sign Up
  @kit: web
  @width: 400
  @height: 480
  @tags: form, signup, register, auth
-->
<div data-component="Form — Sign Up" style="width:100%;background:var(--kit-bg, #FFFFFF);border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius-md, 12px);padding:var(--kit-space-8, 32px);box-sizing:border-box;font-family:var(--kit-font, Inter, system-ui, sans-serif)">
  <div style="font-size:var(--kit-text-2xl, 24px);font-weight:var(--kit-font-bold, 700);color:var(--kit-text, #0F172A);margin-bottom:var(--kit-space-2, 8px)">Create Account</div>
  <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);margin-bottom:var(--kit-space-6, 24px)">Start your journey with us today.</div>
  <form style="display:flex;flex-direction:column;gap:var(--kit-space-4, 16px)">
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Full Name</label>
      <input type="text" placeholder="Enter your full name" style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Email</label>
      <input type="email" placeholder="Enter your email" style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Password</label>
      <input type="password" placeholder="Create a password" style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--kit-space-1, 4px)">
      <label style="font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A)">Confirm Password</label>
      <input type="password" placeholder="Confirm your password" style="height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);padding:0 12px;font-size:var(--kit-text-sm, 14px);color:var(--kit-text, #0F172A);background:var(--kit-bg, #FFFFFF);outline:none;font-family:var(--kit-font, Inter, system-ui, sans-serif);box-sizing:border-box" />
    </div>
    <div style="display:flex;align-items:flex-start;gap:var(--kit-space-2, 8px)">
      <input type="checkbox" style="width:16px;height:16px;margin-top:2px;accent-color:var(--kit-primary, #6366F1);flex-shrink:0" />
      <span style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);line-height:1.4">I agree to the <a href="#" style="color:var(--kit-primary, #6366F1);text-decoration:none;font-weight:var(--kit-font-medium, 500)">Terms of Service</a> and <a href="#" style="color:var(--kit-primary, #6366F1);text-decoration:none;font-weight:var(--kit-font-medium, 500)">Privacy Policy</a></span>
    </div>
    <button type="submit" style="height:42px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border:none;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-semibold, 600);cursor:pointer;font-family:var(--kit-font, Inter, system-ui, sans-serif)">Create Account</button>
  </form>
  <div style="text-align:center;margin-top:var(--kit-space-5, 20px);font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569)">Already have an account? <a href="#" style="color:var(--kit-primary, #6366F1);text-decoration:none;font-weight:var(--kit-font-semibold, 600)">Sign in</a></div>
</div>
