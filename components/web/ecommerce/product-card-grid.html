<div data-component="Product Card — Grid" style="width:100%;max-width:240px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);overflow:hidden;display:flex;flex-direction:column;">
  <div style="position:relative;width:100%;height:200px;overflow:hidden;">
    <img src="https://placehold.jp/240x200" alt="Classic Leather Bag" style="width:100%;height:100%;object-fit:cover;display:block;" />
    <span style="position:absolute;top:8px;left:8px;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);font-size:var(--kit-text-xs,12px);font-weight:var(--kit-font-semibold,600);padding:4px 8px;border-radius:var(--kit-radius-sm,4px);">Summer Collection</span>
  </div>
  <div style="padding:12px;display:flex;flex-direction:column;gap:8px;flex:1;">
    <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);line-height:1.3;">Classic Leather Bag</span>
    <div style="display:flex;align-items:center;gap:4px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="none"><defs><linearGradient id="half-star"><stop offset="50%" stop-color="var(--kit-warning,#F59E0B)"/><stop offset="50%" stop-color="var(--kit-border,#E2E8F0)"/></linearGradient></defs><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z" fill="url(#half-star)"/></svg>
      <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-3,#94A3B8);margin-left:2px;">4.5</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:var(--kit-text-lg,18px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$129.99</span>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-3,#94A3B8);text-decoration:line-through;">$179.99</span>
    </div>
    <button style="width:100%;padding:8px 0;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:none;border-radius:var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;margin-top:auto;">Add to Cart</button>
