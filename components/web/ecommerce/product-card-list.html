<!--
  @name: Product Card — List
  @kit: web
  @width: 500
  @height: 140
  @tags: product, card, list, horizontal, ecommerce
-->
<div data-component="Product Card — List" style="width:100%;max-width:500px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);background:var(--kit-bg,#FFFFFF);border-radius:var(--kit-radius-md,12px);border:1px solid var(--kit-border,#E2E8F0);overflow:hidden;display:flex;flex-direction:row;align-items:stretch;height:140px;">
  <div style="width:120px;min-width:120px;height:100%;overflow:hidden;">
    <img src="https://placehold.jp/120x140" alt="Organic Cotton T-Shirt" style="width:100%;height:100%;object-fit:cover;display:block;" />
  </div>
  <div style="flex:1;padding:12px 16px;display:flex;flex-direction:column;justify-content:space-between;">
    <div style="display:flex;flex-direction:column;gap:4px;">
      <span style="font-size:var(--kit-text-md,16px);font-weight:var(--kit-font-semibold,600);color:var(--kit-text,#0F172A);line-height:1.3;">Organic Cotton T-Shirt</span>
      <span style="font-size:var(--kit-text-sm,14px);color:var(--kit-text-2,#475569);line-height:1.4;">Soft, breathable fabric with a relaxed fit. Available in multiple colors.</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="display:flex;align-items:center;gap:2px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="var(--kit-warning,#F59E0B)" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 22 12 18.56 5.82 22 7 14.14l-5-4.87 6.91-1.01L12 2z"/></svg>
          <span style="font-size:var(--kit-text-xs,12px);color:var(--kit-text-2,#475569);font-weight:var(--kit-font-medium,500);">4.8</span>
        </div>
        <span style="font-size:var(--kit-text-lg,18px);font-weight:var(--kit-font-bold,700);color:var(--kit-text,#0F172A);">$34.99</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;border:1px solid var(--kit-border,#E2E8F0);border-radius:var(--kit-radius,8px);overflow:hidden;">
        <button style="width:32px;height:32px;border:none;background:var(--kit-surface,#F8FAFC);color:var(--kit-text-2,#475569);font-size:var(--kit-text-md,16px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--kit-font,Inter,system-ui,sans-serif);">−</button>
        <span style="width:28px;text-align:center;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-medium,500);color:var(--kit-text,#0F172A);">1</span>
        <button style="width:32px;height:32px;border:none;background:var(--kit-surface,#F8FAFC);color:var(--kit-text-2,#475569);font-size:var(--kit-text-md,16px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--kit-font,Inter,system-ui,sans-serif);">+</button>
      </div>
    </div>
  </div>
</div>
