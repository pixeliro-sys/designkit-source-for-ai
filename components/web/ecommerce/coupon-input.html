<!--
  @name: Coupon Input
  @kit: web
  @width: 360
  @height: 48
  @tags: coupon, promo, discount, input, ecommerce
-->
<div data-component="Coupon Input" style="width:100%;max-width:360px;box-sizing:border-box;font-family:var(--kit-font,Inter,system-ui,sans-serif);display:flex;flex-direction:row;gap:0;height:48px;">
  <input type="text" placeholder="Enter promo code" style="flex:1;padding:0 14px;border:1px solid var(--kit-border,#E2E8F0);border-right:none;border-radius:var(--kit-radius,8px) 0 0 var(--kit-radius,8px);font-size:var(--kit-text-sm,14px);font-family:var(--kit-font,Inter,system-ui,sans-serif);color:var(--kit-text,#0F172A);background:var(--kit-bg,#FFFFFF);outline:none;height:100%;box-sizing:border-box;" />
  <button style="padding:0 20px;background:var(--kit-primary,#6366F1);color:var(--kit-bg,#FFFFFF);border:1px solid var(--kit-primary,#6366F1);border-radius:0 var(--kit-radius,8px) var(--kit-radius,8px) 0;font-size:var(--kit-text-sm,14px);font-weight:var(--kit-font-semibold,600);font-family:var(--kit-font,Inter,system-ui,sans-serif);cursor:pointer;white-space:nowrap;height:100%;box-sizing:border-box;">Apply</button>
</div>
