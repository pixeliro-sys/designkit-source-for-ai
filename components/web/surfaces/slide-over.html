<!--
  @name: Slide Over Panel — Right Side
  @kit: web
  @width: 400
  @height: 640
  @tags: slide-over, panel, drawer, side, detail
-->
<div data-component="Slide Over Panel — Right Side" style="width:400px;height:100%;background:var(--kit-bg, #FFFFFF);border-left:1px solid var(--kit-border, #E2E8F0);font-family:var(--kit-font, Inter, system-ui, sans-serif);display:flex;flex-direction:column;box-shadow:-4px 0 16px rgba(0,0,0,0.05)">
  <div style="display:flex;align-items:center;padding:20px 24px;border-bottom:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:1;font-size:var(--kit-text-lg, 18px);font-weight:var(--kit-font-semibold, 600);color:var(--kit-text, #0F172A)">Details</div>
    <div style="cursor:pointer;color:var(--kit-text-3, #94A3B8);display:flex;align-items:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
  </div>
  <div style="flex:1;padding:24px;overflow-y:auto">
    <div style="font-size:var(--kit-text-sm, 14px);color:var(--kit-text-2, #475569);line-height:1.6">Panel content goes here. Forms, details, or any other content.</div>
  </div>
  <div style="display:flex;gap:12px;padding:16px 24px;border-top:1px solid var(--kit-border, #E2E8F0)">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;height:40px;border:1px solid var(--kit-border, #E2E8F0);border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);color:var(--kit-text, #0F172A);cursor:pointer">Cancel</div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;height:40px;background:var(--kit-primary, #6366F1);color:#FFFFFF;border-radius:var(--kit-radius, 8px);font-size:var(--kit-text-sm, 14px);font-weight:var(--kit-font-medium, 500);cursor:pointer">Save</div>
  </div>
</div>
